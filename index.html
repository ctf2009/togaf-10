WP5 ends before the Q4 2027 contractual deadline — the constraint captured back in Phase A is now visibly shaping the plan. That traceability thread (constraint → scope → roadmap) is exactly what Part 2 scenarios reward.
</script>

<script type="text/markdown" id="md-08-traps">
## Exam traps

- **Phase E produces the *initial complete* Architecture Roadmap and IMP v0.1; Phase F *finalises* both.** Initial vs final is the single most-tested E/F distinction.
- **Transition Architectures must deliver continuous business value** — options describing purely technical milestones are low scorers.
- **Phase E is the first phase directly concerned with implementation** — a recall question that appears verbatim.
- **Consolidation across B/C/D** is E's distinctive move — scenario answers that take each domain's gaps to delivery independently miss the point of the phase.
- **Make/buy/reuse** decisions live here, informed by the Enterprise Continuum and Architecture Repository — the SBB story starts in E, not in C/D.
</script>

<script type="text/markdown" id="md-09-theory">
## Why this phase exists

Phase F turns the roadmap into an executable, funded, agreed plan. This is where architecture meets the people who own the calendar and the chequebook — a humbling experience the method wisely builds in. Where E asked "what work, in what order, through what states?", F asks "what does each piece cost, what is it worth, who delivers it, when — and does the rest of the enterprise's change machinery agree?"

## Objectives

1. **Finalize** the Architecture Roadmap and the supporting **Implementation and Migration Plan**.
2. Ensure the IMP is **coordinated with the enterprise's approach to managing and implementing change** in its overall change portfolio.
3. Ensure the **business value and cost** of work packages and Transition Architectures is understood by key stakeholders.

Objective 2 is underrated: the IMP doesn't live alone — it must mesh with business planning, portfolio/programme management, and operations management frameworks. For Meridian that means the SAFe portfolio backlog, the annual investment cycle, and ops change windows.

## Key activities

- Confirm interactions with the management frameworks above.
- **Assign business value to each work package** — establishing performance metrics, using techniques like ROI and the business value assessment matrix (value vs risk plotted to support prioritisation).
- Estimate **resource requirements, timings, and delivery vehicles** for each project.
- **Prioritise migration projects** via cost/benefit assessment and risk validation.
- Confirm the final Architecture Roadmap — and update the Architecture Definition Document if the plan forces architecture changes (e.g. a transition state moves).
- Generate the complete **Implementation and Migration Plan**.
- **Close the architecture development cycle: document lessons learned.** Phase F ends the development cycle; G and H operate on what it produced.

## Supporting tools the exam names

- **Implementation Factor Catalog** — records the factors (actions, constraints, dependencies, risks, issues) influencing the plan.
- **Consolidated Gaps, Solutions, and Dependencies Matrix** — the E/F working table tying gaps to proposed solutions and their dependencies.
- **Business value assessment matrix** — value on one axis, risk on the other; each work package plotted; portfolio conversations follow.
</script>

<script type="text/markdown" id="md-09-artifacts">
## 1 · Prioritised work packages (value / cost / risk excerpt)

| WP | Business value | Cost | Risk | Priority | Delivery vehicle |
|---|---|---|---|---|---|
| WP4 Platform Foundation | Enabler (indirect) | $$ | Medium | 1 — critical path | Group Technology + cloud partner |
| WP3 Integration Layer | High (launch agility) | $$ | Medium | 1 — critical path | Retail Tech ART |
| WP2 Customer Data Platform | High (single view, CPS 230) | $$$ | High | 2 | Data ART + vendor |
| WP5 Coastline Migration | Contractual (deadline-bound) | $$ | High | 2 — date-fixed | Migration factory (dedicated) |
| WP1 Digital Origination | Very high (revenue) | $$ | Medium | 3 — depends on WP2/3 | Retail Tech ART |
| WP6 Core Strangulation | High (run-cost, risk) | $$$$ | High | 4 — long tail | Per-domain squads |

Note WP5: priority isn't earned by value ranking — it's **date-fixed** by the contractual constraint. Plans must distinguish value-prioritised from constraint-pinned work.

## 2 · Migration approach — Coastline cutover waves

| Wave | Scope | Fallback |
|---|---|---|
| Pilot | 2k staff + friendly accounts | Full reversal supported |
| Wave 1 | 60k low-complexity retail customers | Reversal supported, 48h window |
| Wave 2 | 100k remaining retail | Reversal degraded — remediation-forward |
| Wave 3 | 18k complex (joint accounts, business) | No reversal — exception handling only |

Wave design *is* risk management: confidence is bought with the cheap waves before the expensive ones. The matching rules and quality criteria from Phase C are each wave's entry gate.

## 3 · Lessons learned (cycle closure excerpt)

> Capability heat-mapping unlocked exec engagement faster than any architecture diagram — lead with it next cycle. Interoperability reconciliation in Phase E surfaced a conflict between the payments scheme mandate and the event backbone design that should have been caught in Phase C — add a cross-domain review step to the tailored method. The Architecture Board cadence (fortnightly) was too slow during Phase E consolidation — adopt a surge cadence for that phase.

Unglamorous, but this is the output that makes the *capability* better — and it's how Phase F formally closes the development cycle.
</script>

<script type="text/markdown" id="md-09-traps">
## Exam traps

- **F finalises; E initiates.** The Implementation and Migration Plan reaches version 1.0 here.
- **Coordination with existing change frameworks** (business planning, portfolio management, operations) is an explicit objective — answers that treat the IMP as self-contained score low.
- **Business value assignment is per work package**, with metrics — "the programme has a business case" isn't the same thing.
- **Lessons learned in Phase F close the architecture development cycle.** A recall favourite.
- If finalising the plan forces architecture changes (a transition state shifts, a work package merges), the **Architecture Definition Document gets updated** — the plan and the architecture stay consistent, not separately versioned realities.
</script>

<script type="text/markdown" id="md-10-theory">
## Why this phase exists

The architecture is approved and the plan is funded — now delivery teams start building, and Phase G exists to ensure what gets built is what was architected. It runs in parallel with implementation and ends when the solution is fully deployed.

## Objectives

1. Ensure **conformance with the Target Architecture** by implementation projects.
2. Perform appropriate **Architecture Governance functions** for the solution and any implementation-driven change requests.

## The Architecture Contract

The central instrument: a **joint agreement between development partners and sponsors** on the deliverables, quality, and fitness-for-purpose of an architecture. Signed at the start of implementation, it's what compliance gets assessed *against*. Don't confuse it with the Statement of Architecture Work (the Phase A contract to *do architecture work*) — the Architecture Contract governs *implementation* of the architecture.

## Compliance terminology (learn the ladder)

Six words for the single question "did you build what we asked?" — because one word would have been too easy. The trick is always what's implemented vs what's specified:

| Term | Meaning |
|---|---|
| **Irrelevant** | Implementation has no features in common with the specification |
| **Consistent** | Some common features, implemented per spec — but some spec features missing, and some implemented features outside spec |
| **Compliant** | Everything implemented is per spec — but some spec features are missing |
| **Conformant** | All spec features implemented per spec — but extra features exist beyond spec |
| **Fully conformant** | Perfect correspondence: everything in spec, nothing beyond it |
| **Non-conformant** | Some spec features are implemented *not in accordance* with the spec |

Working shorthand: *compliant = incomplete but obedient; conformant = complete but over-delivering; non-conformant = disobedient.* (Full Simplify treatment coming in the revision pass.)

## Key activities

- Confirm scope and priorities for deployment with development management
- Identify deployment resources and skills
- Guide development of solutions deployment
- Perform **Enterprise Architecture compliance reviews** — against the Architecture Contract and the standards in the SIB
- Implement business and IT operations
- Perform **post-implementation review** and close the implementation

When projects can't comply, governance can grant a **dispensation** — a time-bound, recorded exception with conditions, not a quiet waiver. Everything lands in the Governance Log.
</script>

<script type="text/markdown" id="md-10-artifacts">
## 1 · Architecture Contract (excerpt — WP3 Integration Layer)

> **Parties:** Retail Tech ART (development partner); CIO as sponsor; Architecture Board as governance authority.
> **Scope & deliverables:** API management and event backbone services per the Target Technology Architecture, exposing the facade defined in Transition Architecture T1.
> **Conformance requirements:** OAuth 2.1/OIDC per Standards Catalog; event contracts published as AsyncAPI; no direct channel-to-monolith integrations introduced; dual-region deployment per Environments & Locations.
> **Compliance checkpoints:** design review before PI 4; pre-production compliance review; post-implementation review within 60 days of go-live.
> **In Meridian's tailored method:** implemented as a SAFe enabler epic whose acceptance criteria *are* the conformance requirements — one backlog, governance embedded.

## 2 · Compliance review finding (excerpt)

| Item | Spec | Found | Assessment |
|---|---|---|---|
| Auth | OAuth 2.1 all APIs | OAuth 2.1 on 14/14 APIs | Per spec |
| Event contracts | AsyncAPI published | Published for 9/12 topics | Spec features missing |
| Extra | — | Team added a GraphQL gateway (not in spec) | Beyond spec |

**Ruling: Non-conformant?** No — nothing was implemented *contrary* to spec. Missing spec features + extra features = neither cleanly Compliant (extras exist) nor Conformant (spec incomplete) — recorded as **Consistent**, with remediation actions for the missing topics and an Architecture Board decision required on the GraphQL gateway (adopt into spec, or remove). This is exactly the judgement the terminology ladder exists to support.

## 3 · Dispensation (excerpt)

> **Request:** WP5 migration factory to use FTP (status: Retirement) for Coastline extract files — the legacy core supports nothing else.
> **Decision:** Granted, scoped to the Coastline extract interface only, expiring at migration completion; compensating controls (encryption at rest, network isolation); recorded in Governance Log; SIB unchanged.

A good dispensation is narrow, dated, conditional, and logged — it bends the standard without breaking the governance.
</script>

<script type="text/markdown" id="md-10-traps">
## Exam traps

- **Architecture Contract ≠ Statement of Architecture Work.** SoAW = Phase A, agreement to do architecture work; Architecture Contract = Phase G, agreement governing implementation.
- **The compliance ladder** — expect a described situation and "which term applies?" The discriminators: anything contrary to spec → non-conformant; obedient-but-incomplete → compliant; complete-plus-extras → conformant.
- **Phase G ends when the solution is fully deployed**, closed by post-implementation review.
- **Dispensations are time-bound recorded exceptions**, granted by governance — not permanent waivers, and not informal.
- Implementation-driven **change requests** are handled through governance here; whether a change *to the architecture itself* is needed is Phase H's call.
</script>

<script type="text/markdown" id="md-11-theory">
## Why this phase exists

Architectures decay the day they're deployed — regulations move, vendors withdraw products, businesses pivot, acquisitions land. Entropy is the only stakeholder who never misses a meeting. Phase H is the continuous watch that keeps the architecture matched to reality and decides the most consequential question in the whole method: **does this change need a new ADM cycle?**

## Objectives

1. Ensure the **architecture lifecycle is maintained**
2. Ensure the **Architecture Governance Framework is executed**
3. Ensure the **Enterprise Architecture Capability meets current requirements**

## Drivers for change

- **Technology drivers** — new technology reports, asset cost reductions, technology withdrawal (vendor ends support), standards initiatives
- **Business drivers** — business-as-usual developments, business exceptions, innovations, strategic change, top-down directives

## The three classifications of change

| Class | Character | Typical handling |
|---|---|---|
| **Simplification** | Reduces investment — removing duplication, decommissioning, streamlining | Change management techniques |
| **Incremental** | Derives *additional value from existing investment* | Change management, or a new cycle if substantial |
| **Re-architecting** | Requires *increased investment* — the architecture itself must change | New ADM cycle |

And the practical guideline for "is this an architecture change requiring a new cycle?": if the change impacts **two or more stakeholders**, it likely needs a full cycle; if it impacts only one, it's more likely a candidate for change-management handling.

When a new cycle is warranted, Phase H produces a **new Request for Architecture Work** — the wheel turns again, which is why H points back to A on every ADM diagram.

## Key activities

- Establish a **value realization process** — did the deployed architecture deliver the business value Phase F promised?
- Deploy **monitoring tools**; manage risks continuously
- Provide analysis for architecture change management; develop change requirements to meet performance targets
- Manage the governance process and framework
- **Activate the process to implement change** — including producing that new Request for Architecture Work
</script>

<script type="text/markdown" id="md-11-artifacts">
## Change request log (excerpt, with classification reasoning)

| Change request | Driver | Classification | Handling |
|---|---|---|---|
| Decommission duplicate reporting tools inherited from Coastline | Business-as-usual | **Simplification** — reduces investment | Change management; Governance Log entry |
| Adopt new payments scheme mandate (industry deadline) | Standards initiative | **Incremental** — extends Payments Engine value | Change management within Payments segment; impacts one segment architecture |
| Core monolith vendor announces end of extended support 18 months early | Technology withdrawal | **Re-architecting** — WP6 sequencing and two transition states invalidated; impacts CRO, Retail, Group Technology | **New Request for Architecture Work** — cycle re-entry, scoped to the affected segments |
| Branch network reduction (30% closures announced) | Strategic change | **Re-architecting** — Business Architecture assumptions (channel mix, org map) no longer hold; multiple stakeholders | New RfAW; Preliminary-phase revisit not required (capability unchanged) |

The discipline on display: classification is argued from **investment character and stakeholder spread**, not from how big the change feels. The vendor-support row is the exam archetype — a technology driver forcing re-architecting through the front door of a new cycle, not patched through governance.

## Value realization check (excerpt)

| Phase F promise | Measured at H | Verdict |
|---|---|---|
| Product launch cycle < 8 weeks post-T2 | 6.5 weeks (first two launches) | Realised |
| Integration defect rate −60% | −45% | Partial — analysis fed back as change requirement |
| Coastline migration by Q4 2027 | Wave 3 completed Oct 2027 | Realised |

Without this loop, the architecture function can't prove it returns value — and the exam knows it: value realization is a named Phase H activity.
</script>

<script type="text/markdown" id="md-11-traps">
## Exam traps

- **Simplification / incremental / re-architecting** — keyed to investment: reduce / extract more from existing / increase. Memorise the triple.
- **Two-or-more-stakeholders** impacted → likely a full new ADM cycle. The guideline appears in scenario discriminators.
- **Phase H issues the new Request for Architecture Work** that starts the next cycle — H doesn't redesign the architecture itself.
- **H is continuous**, not a periodic review project — like Requirements Management, it operates throughout.
- **Value realization** belongs to H — "did we get the value Phase F claimed?" is this phase's question, not Phase F's.
</script>

<script type="text/markdown" id="md-12-theory">
## Why this phase exists

Requirements are the most volatile element of architecture work — they surface in every phase, change while you work, and contradict each other, usually before lunch. Rather than pretending requirements arrive once at the start, the ADM puts a continuous phase at the centre of the wheel whose only job is the *flow*: capture, store, and feed requirements into and out of every phase.

## Objectives

1. Ensure the **Requirements Management process is sustained** and operates for all relevant ADM phases
2. **Manage architecture requirements** identified during any execution of the ADM cycle or a phase
3. Ensure relevant requirements are **available for use** by each phase as it executes

## The crucial boundary

Requirements Management **does not dispose of requirements**. It doesn't prioritise them, address them, or reject them — *the relevant ADM phase does that*. RM is the circulatory system, not the brain. This single distinction settles a remarkable number of exam questions: any option where "the Requirements Management phase decides/resolves/prioritises" is wrong.

## Where requirements live

- **Architecture Requirements Repository** (a part of the Architecture Repository) — holds all authorised architecture requirements, current and historical
- **Architecture Requirements Specification** (a deliverable) — the quantitative statements outlining what an implementation must do; takes shape through Phases B–D as a companion to the Architecture Definition Document. Rough division: the ADD is the *qualitative* view (what the architecture is), the Requirements Specification is the *quantitative* view (what must be met).

## How it actually flows

```mermaid
flowchart LR
    PH[Any ADM phase] -->|new or changed requirement| RM[Requirements Management]
    RM -->|store and baseline| REP[(Architecture Requirements Repository)]
    RM -->|feed relevant requirements| PH2[Phase that must address them]
    PH2 -->|disposition: address, defer, or reject| REP
```

A requirement raised in Phase G (an implementation discovers a constraint) flows through RM and may land back in Phase D's lap — or trigger Phase H's bigger question. The hub makes that routing explicit instead of accidental.

**Business scenarios** (Phase A/B technique) are a major *source* of well-formed requirements — a good scenario yields requirements with the problem, environment, actors, and success measures already attached, which is what makes them manageable downstream.
</script>

<script type="text/markdown" id="md-12-artifacts">
## Architecture Requirements Repository (excerpt, with traceability)

| ID | Requirement | Source | Raised in | Disposed in | Disposition |
|---|---|---|---|---|---|
| R-014 | Critical services evidence impact tolerance ≤ 4h (CPS 230) | Driver: regulation | Phase A | Phase D | Addressed — dual-region active-active |
| R-031 | Single mastered customer record across brands | Business scenario: onboarding | Phase B | Phase C | Addressed — CDP target |
| R-047 | Cross-bank duplicate matching ≥ 99.5% precision | Migration analysis | Phase C | Phase C / F | Addressed — matching rules + wave gates |
| R-052 | Real-time balance on all channels | Head of Retail | Phase B | Phase C | **Deferred** — T2 scope; interim 60s freshness accepted, recorded with stakeholder sign-off |
| R-063 | Coastline extract via FTP only | Implementation constraint | Phase G | Phase G | Addressed via dispensation, expiring at migration end |

Things worth noticing: every row has a *phase that raised it* and a *phase that disposed of it* — never RM itself. R-052 shows a **deferral done properly**: explicit, scoped to a transition state, signed off — not quietly dropped. R-063 shows the G→RM→G loop: implementation reality flowing back through the hub.
</script>

<script type="text/markdown" id="md-12-traps">
## Exam traps

- **RM stores and routes; phases dispose.** Address / defer / reject happens in the relevant phase. This is the most-tested fact about the entire phase.
- **Repository vs Specification:** the Architecture Requirements *Repository* is where requirements live (part of the Architecture Repository); the Architecture Requirements *Specification* is a deliverable — the quantitative companion to the Architecture Definition Document.
- **RM is continuous and central** — it operates throughout the cycle, drawn at the hub of the wheel for that reason.
- Requirements can be raised by **any phase** — including G (implementation constraints) and H (change analysis) — and routed to whichever phase must act.
- **Business scenarios** produce well-formed requirements; if a question asks how to generate requirements that are complete and verifiable early in the cycle, that's the technique it wants.
</script>

<script type="text/markdown" id="md-overview-simplify">
## The ADM is renovating a house you're living in

Hold this one story in your head and the entire method falls into place. You own an ageing house (the enterprise). It mostly works, but the kitchen is from 1998, the wiring is scary, and your in-laws are moving in (the acquisition). You can't move out while the work happens — the business keeps trading.

| Phase | The renovation move |
|---|---|
| **Preliminary** | Decide how your household makes decisions before anyone swings a hammer: who holds the budget, what the house rules are ("we never borrow against the mortgage", "shoes off"), which tradie frameworks you'll work with. Hire the architect. **No design happens here.** |
| **A — Vision** | Agree with the whole family what you actually want — "open-plan living, a granny flat for the in-laws" — and sign the architect's engagement letter (the Statement of Architecture Work). Get everyone *excited and committed* before drawing details. |
| **B — Business** | How do you want to *live*? Who cooks, where do kids do homework, how do guests flow through the house? Lifestyle before layout. |
| **C — Information Systems** | What goes *in* the house and how it connects — where things are stored, which rooms talk to each other, who has keys to what. |
| **D — Technology** | Foundations, framing, plumbing, electrical capacity. "We need three-phase power", not "buy this specific switchboard". |
| **E — Opportunities & Solutions** | The builder breaks the dream into stages you can live through: "kitchen first — you'll cook in the garage for six weeks, *but you can still cook*." Each stage is a livable state. |
| **F — Migration Planning** | Book it: dates around school terms and weather, budget per stage, deposits, which tradies. Write down what each stage costs and what it gets you. |
| **G — Implementation Governance** | Site inspections. Is the builder building *the drawings*, or improvising? Deviations get assessed, not ignored — and not quietly tolerated. |
| **H — Change Management** | You live in it. The family grows, a tree falls on the carport, regulations change. Most things are maintenance; occasionally it's "time to renovate again" — and you write a new brief for the architect. |
| **Requirements Mgmt** | The running list on the fridge. Everyone adds wishes from every room at every stage; the list *holds and routes* them — but the list never decides. The relevant stage of the project decides. |

When an exam question confuses you, ask: *what would this be in the renovation?* "Should we pick the switchboard brand during foundation design?" — obviously not, that's a Phase E decision wearing a Phase D costume. The analogy answers a surprising number of questions before the jargon does.
</script>

<script type="text/markdown" id="md-02-simplify">
## Deliverable, artifact, building block — the drawing pack

- **Deliverable** = the stamped drawing pack you contractually owe the client. Formal, reviewed, signed.
- **Artifact** = each individual sheet inside it — a drawing, a schedule, a list.
- **Building block** = the stuff the design is made of — and here's the split that wins marks:
  - **ABB**: "a load-bearing wall capable of carrying a second storey" — the *capability*, product-agnostic
  - **SBB**: "Boral 200-series concrete blocks" — the *product* that delivers it

## Catalog, matrix, diagram — the 3-second test

Could it be written as a **list**? Catalog. Is it **two kinds of things cross-referenced** (a spreadsheet with row and column headers)? Matrix. Would you naturally **draw it**? Diagram. That's the whole classification — don't overthink it in the exam.

## The Enterprise Continuum — buying a suit

Off-the-rack (**Foundation**) → the chain store tailors it (**Common Systems**) → the banking-industry uniform cut (**Industry**) → fully bespoke for you (**Organization-Specific**). The discipline it enforces: **look left before you sew your own.** Most of what you need already exists in a more generic form — adapt it rightward instead of starting from cloth.

## The Architecture Repository — a well-run workshop

| Repository part | In the workshop |
|---|---|
| Standards Information Base | The rules pinned on the wall — what's allowed in here |
| Reference Library | The pattern drawers — templates and jigs to reuse |
| Governance Log | The decisions diary — who approved what, when, why |
| Architecture Landscape | The photo wall of everything currently built |
| Requirements Repository | The customer order book |
| Architecture Metamodel | The labelling system that keeps the drawers consistent |

And the **Landscape's three levels** are just zoom on Google Maps: **Strategic** = country view, **Segment** = city view, **Capability** = street view. Same territory, three altitudes.
</script>

<script type="text/markdown" id="md-03-simplify">
## The Preliminary Phase — setting up the kitchen before cooking

You don't start a restaurant by cooking. You decide who's head chef, agree the house rules, choose which cuisines you'll serve and which you won't, buy the knives, and agree how the kitchen works alongside front-of-house (your SAFe, your ITIL). **No meals are produced.** Anyone claiming the Preliminary Phase designed an architecture is claiming the kitchen-fitout produced dinner.

## Architecture Principles — the fridge magnet

Every house rule worth having has the same four parts:

> **Name:** Shoes Off
> **Statement:** Outdoor footwear is removed at the door, no exceptions.
> **Rationale:** New carpets; toddler eats off the floor.
> **Implications:** We need a shoe rack and a bench at the door; guests get warned before they visit.

Name / Statement / Rationale / **Implications** — and the implications are the honest bit: what the rule *costs you*. A principle with no implications is a slogan.

## The Request for Architecture Work

The renovation brief the homeowner hands the architect: "here's roughly what we want, here's why, please come back with an engagement proposal." It *triggers* Phase A — it isn't produced by it.
</script>

<script type="text/markdown" id="md-04-simplify">
## Phase A — the movie pitch and the deal memo

The **Architecture Vision** is the trailer cut before the film is made: two minutes that make the studio lean forward and say "we want that". High-level, aspirational, emotionally legible to executives.

The **Statement of Architecture Work** is the deal memo signed afterwards: scope, schedule, roles, acceptance criteria, how changes get handled. The pitch creates desire; the memo creates commitment. Phase A isn't done until the memo is signed.

The **stakeholder map** is knowing who can greenlight the film and who can quietly kill it in a corridor — which is why it happens at step 2, not step 9. And the golden rule of the pitch: **no casting decisions in the trailer.** A Solution Concept diagram naming Kafka is announcing the lead actor before the script exists — instant credibility loss, instant exam-points loss.
</script>

<script type="text/markdown" id="md-05-simplify">
## Capability vs value stream vs process — the restaurant

- **Capability** = the kitchen stations. The grill *exists* regardless of who's rostered on or which recipe is running tonight. Stations survive every staff reshuffle — that's why the capability map survives every reorg.
- **Value stream** = the diner's journey: hungry → seated → ordered → fed → paid → happy. End-to-end, from the *stakeholder's* side of the pass.
- **Process** = the carbonara recipe. Detailed, sequenced, changes whenever the chef has a better idea.
- **Organization map** = the roster. Changes constantly; never confuse it with the stations.

The **heat map** is the manager's Friday-night insight: the dessert station is why tables turn slowly. Cross-map stations (capabilities) to journey stages (value stream) and the bottleneck announces itself — *that's* where the investment goes.

## Gap analysis — packing to move house

Walk the old house listing everything (**baseline**). Walk the new floor plan listing what belongs there (**target**). Three honest outcomes:

- Item in both → goes on the truck (carried over)
- Item only in the old house → the **Eliminated** column — either "we deliberately left the ratty sofa" or "WE FORGOT THE CAT." The column exists to make you say which.
- Item only in the new plan → the **New** row — the shopping list. **The shopping list is the roadmap.**
</script>

<script type="text/markdown" id="md-06-simplify">
## Phase C — the contents of the house

**Data Architecture** is what's in the boxes and who owns them; **Application Architecture** is the rooms and how they connect. Unpack kitchen first or bedroom first? Genuinely either — TOGAF blesses both orders, and the exam tests that you know it's a free choice.

**The CRUD matrix is the key register** — who holds keys to which rooms, and crucially who can *change* what's inside. Two applications with create/update rights on the same data entity is two people with admin access to the same bank account. Nobody planned it, everybody regrets it, and the matrix is how you spot it in one glance.

**Data migration is the removalist truck with a cleaning crew at the ramp.** Nothing goes on the truck dirty: cleanse, de-duplicate (are these two "S. Mitchells" from the two banks the same person?), transform to fit the new shelves, validate against quality criteria — and a remediation pile for everything that fails the check. "Chuck it all in and sort it at the new house" is how 180k customers end up duplicated in your shiny new platform.
</script>

<script type="text/markdown" id="md-07-simplify">
## Phase D — capability specs, not shopping

Phase D writes "I need a ute that tows 3 tonnes, seats five, and runs on the fuel we already stock." It does **not** write "buy the HiLux." Specifying the requirement is architecture; picking the model is Phase E's solution work. Every time you feel the urge to name a product in Phase D, the exam is watching.

## The Standards Catalog — traffic lights for technology

- **Emerging** = amber. Proceed carefully, pilot it.
- **Mainstream** = green. Use it freely; it's the default.
- **Containment** = red. Existing traffic finishes the journey; **no new vehicles enter.**
- **Retirement** = tow-away zone. Anything still parked here is getting removed on a schedule.

A scenario about "should the new project use SOAP?" is a traffic-light question: SOAP is at red, so no new consumers — and exceptions need a doctor's note (see Phase G's dispensations).

**Environments & Locations** is simply which garage each car sleeps in — and *why*. Meridian's dual-region answer isn't taste, it's traceable: regulation → principle → requirement → two garages.
</script>

<script type="text/markdown" id="md-08-simplify">
## Phase E — sketching the road trip

You've decided on the destination (the target). Phase E picks the **route and the overnight towns**.

- A **Transition Architecture** is a real town: it has a pub, fuel, and beds. If the trip pauses there for six months, *life is fine* — you're operating, banking value. "47% of the way there" is not a town; it's sleeping on the roadside at the halfway mark. That's the entire "continuous business value" test in one image.
- A **work package** is one leg of the drive — a bounded chunk with a purpose.
- **Make / buy / reuse** is: drive your own car, hire one, or borrow your mate's — and you check what's in the garage (the Enterprise Continuum) *before* buying.
- **Consolidation** is noticing that three family members independently wrote "we need to sort the esky" on three different lists — it's one job, not three.

And the E/F boundary in six words: **E sketches the trip; F books it.**
</script>

<script type="text/markdown" id="md-09-simplify">
## Phase F — booking the trip

Everything E sketched now meets reality:

- **Dates** get set against school holidays and weather — that's "coordination with the enterprise's other change frameworks". Your trip doesn't own the calendar; it negotiates with it.
- **Budget per leg**, and what each leg is *worth* — value and cost per work package, understood by the people paying.
- **Who drives which leg** — delivery vehicles and resources.
- The **packing list of gotchas** — "the caravan park shuts in winter", "fuel range on leg 3 is tight" — is the Implementation Factor Catalog: every constraint, dependency, and risk that shapes the booking.
- One stop is **date-fixed** (the wedding you're driving to — Coastline's contractual deadline). It doesn't compete on fun-per-dollar; it's pinned, and everything else flexes around it.

And when the trip's booked, you write **notes for next year's trip** — lessons learned, which formally closes the cycle. F is where the architecture team proves it can land a plan, not just draw one.
</script>

<script type="text/markdown" id="md-10-simplify">
## The compliance ladder — order a pizza

Specification: *large margherita, thin crust, extra basil.* What arrives determines the term:

| Arrives | Term | The logic |
|---|---|---|
| A kebab | **Irrelevant** | Nothing in common with the order |
| Thin-crust margherita, no basil, plus olives you never asked for | **Consistent** | Some of the order done right, some missing, some extras |
| Thin-crust margherita, no extra basil | **Compliant** | Everything present is per the order — but incomplete. *Obedient but incomplete* |
| Exactly as ordered, plus free garlic bread | **Conformant** | The whole order, correctly — plus extras. *Complete but over-delivering* |
| Exactly as ordered, nothing more, nothing less | **Fully conformant** | Perfect correspondence |
| Deep pan instead of thin crust | **Non-conformant** | Something done *contrary* to the order — even if everything else is perfect |

The discriminating question is always: **was anything done contrary to spec?** If yes → non-conformant, full stop. If no, ask what's missing and what's extra, and the table does the rest.

## Two contracts, never confused again

- **Statement of Architecture Work** = hiring the architect to *draw the plans* (Phase A).
- **Architecture Contract** = the builder agreeing to *build to the plans* (Phase G).

## Dispensation — the doctor's note

Named patient, specific condition, expiry date, conditions attached, kept on file. It excuses *this* case for *this* period — it doesn't repeal the rule, and it's never verbal. "The team just used FTP because there was no alternative" is not a doctor's note; it's truancy.
</script>

<script type="text/markdown" id="md-11-simplify">
## The three changes — an F1 season

- **Simplification** = stripping the car: removing a part that adds weight and complexity for no lap time. You *spend less* and lose nothing that matters. (Decommissioning Coastline's duplicate reporting tools.)
- **Incremental** = the upgrade package: new floor, same car. You're extracting **more value from the investment you already made**. Handled within the season — no redesign.
- **Re-architecting** = new regulations: next year's car. The current design can't comply no matter how many upgrades you bolt on — **new investment, new design cycle**. In ADM terms: Phase H writes a new Request for Architecture Work and the wheel turns again.

The stakeholder rule of thumb travels well too: if a change drags **two or more teams** into the conversation (aero *and* power unit), it's not a quick fix — it's a design review. One team affected? Probably an upgrade.

## Value realization — did the upgrade find the lap time?

The simulations (Phase F's business case) promised three tenths. Phase H is the stopwatch: did the deployed change actually deliver? If the answer is "two tenths", that gap is *information* — it feeds change analysis, it doesn't get massaged into a press release. An architecture function that never checks the stopwatch can't prove it deserves next season's budget.
</script>

<script type="text/markdown" id="md-12-simplify">
## Requirements Management — the post office

It sorts, stores, and delivers letters between every phase. **It never opens your mail and writes the reply.** A requirement arrives from any phase, gets logged and baselined, and gets delivered to whichever phase must act — and *that phase* decides: address it, defer it, or reject it. Any exam option where "Requirements Management prioritises/resolves/rejects" has the post office answering your correspondence. Wrong, always.

Same idea, kitchen version: the **ticket rail** above the pass holds every order from every table, in order, visible. The rail never cooks. The chefs cook.

## Repository vs Specification — the filing cabinet and the contract letter

- **Architecture Requirements Repository** = the filing cabinet: every requirement ever raised, current and historical, with its status and who disposed of it.
- **Architecture Requirements Specification** = the formal contract letter you hand the builder: the *measurable* statements this implementation must satisfy. It's a deliverable, built up through B–D, and it's the quantitative twin of the Architecture Definition Document (the ADD says what the architecture *is*; the Spec says what must be *met*).
</script>

<script type="text/markdown" id="md-13-theory">
## Stakeholder management

The power/interest grid drives the engagement approach — created in Phase A, maintained for the rest of the cycle:

| | High interest | Low interest |
|---|---|---|
| **High power** | Key players — **partner closely** | **Keep satisfied** |
| **Low power** | **Keep informed** | Monitor (minimal effort) |

The exam's angle is rarely the grid itself — it's that the 5-point answer in scenarios almost always *engages the stakeholders whose concerns appear in the scenario text*.

## Business scenarios

The technique for discovering and documenting business requirements (Phases A and B). Its purpose is to make sure the architecture solves a **real, completely described** business problem — and to stop the classic failure of designing elegantly for a problem that was never written down.

### The anatomy

| Part | What it captures |
|---|---|
| **Problem** | The business problem, stated *without a solution inside it* |
| **Environment — business** | Where it happens, who's affected, the operating and regulatory context |
| **Environment — technical** | The systems, data, and constraints in play today |
| **Objectives** | What "fixed" looks like — measurable, and **SMART** |
| **Human actors** | The people involved, and their place in the *business* model |
| **Computer actors** | The systems involved, and their place in the *technology* model |
| **Roles, responsibilities, desired outcome** | Who does what, what each actor needs, and the success measures |

Two of these are worth separating in your head, because the exam does: **human actors** map to the business model, **computer actors** map to the technology model. A question that asks which element a business scenario contains beyond problem/environment/objectives is fishing for **actors**.

### SMART objectives

**S**pecific, **M**easurable, **A**ctionable, **R**ealistic, **T**ime-bound. "Improve the customer experience" is a mood, not an objective. "Reduce median time-to-decision from 11 days to ≤ 2 days for standard applications by Q3 2028" is one — and it survives contact with a gap analysis three phases later, which is the whole point.

### The iteration: gathering → analysing → reviewing

The technique is **iterative and workshop-driven**. You gather with the people who live the problem, analyse what you heard, review it back with them, and go round again until the scenario is complete and they recognise their own problem in it. It is explicitly *not* deskwork, and not a one-pass interview.

### What separates a good scenario from a bad one

- **Representative and significant** — it stands for a real slice of business value, not an edge case someone shouted about loudest.
- **Solution-free** — the moment a product, pattern, or technology appears in the problem statement, the scenario has stopped discovering and started assuming.
- **Complete** — all seven parts. A scenario missing actors or measurable objectives can't generate verifiable requirements.
- **Recognisable** — the people who live the problem agree that's the problem.

### Where the output goes

Requirements discovered here flow through **Requirements Management** into the **Architecture Requirements Specification**, and the objectives typically become KPIs in the Architecture Vision. That traceability — *scenario → requirement → architecture decision* — is exactly what a strong Practitioner answer demonstrates.

> A complete worked business scenario for Meridian ("Originate Home Loan") is in **Module 04 → Worked artifacts**.

## Business Transformation Readiness Assessment

Run in Phase A: can the organisation actually absorb this change? Identify the readiness **factors** (vision, desire, need, business case, funding, sponsorship and leadership, governance, accountability, workable approach, IT capacity to execute…), then rate each factor three ways: its **urgency**, its current **readiness status**, and its **degree of difficulty to fix**. Low-readiness factors become transformation risks, feeding straight into risk management and the Capability Assessment.

## Risk management

The cycle: classify → identify → assess **initial level of risk** → mitigate → assess **residual level of risk** → monitor. The two levels are the examinable pair:

- **Initial risk** = the risk categorisation *before* any mitigation
- **Residual risk** = what remains *after* mitigation — never zero, and it's what governance accepts

Assessment combines **effect** (catastrophic / critical / marginal / negligible) with **frequency** (frequent / likely / occasional / seldom / unlikely) to yield an overall rating (extremely high / high / moderate / low). There is no "fine, probably" category, however often it appears in real risk registers.

## Gap analysis (recap)

Covered properly in Module 05 — baseline down the side plus a New row, target across the top plus an Eliminated column, and the whole apparatus exists to catch accidental omissions. It runs in B, C, and D, and its outputs become Phase E's raw material.

## Interoperability

The degree to which parts of the enterprise must share. Three categories: **operational/business** (shared processes), **information** (shared data), and **technical** (shared services/platforms). Requirements are surfaced from Phase A onwards, refined through B–D — and **reconciled in Phase E**, because that's where conflicting expectations between building blocks collide with delivery reality.

## Capability-based planning

Plan, engineer, and deliver change in terms of **business capabilities** rather than projects or org units. Capabilities are delivered through **capability increments** — each increment delivers real, usable value (not partial plumbing), and increments map naturally onto Transition Architectures. It's the technique that keeps the roadmap speaking business language.

## ADM iteration

The ADM is a cycle of cycles. Four iteration groupings:

| Iteration | Phases | Concern |
|---|---|---|
| Architecture Capability | Preliminary, A | Establishing/adjusting the capability and approach |
| Architecture Development | B, C, D, E, F | Developing architecture content |
| Transition Planning | E, F | Forming the roadmap and plan |
| Architecture Governance | G, H | Governing change toward the target |

Plus the directional choice within development: **baseline-first** (understand what exists, derive the target — suits poorly-understood estates) vs **target-first** (design the future, derive only the baseline needed for gaps — suits strategy-driven change). Both are legitimate; choosing is part of tailoring the cycle.
</script>

<script type="text/markdown" id="md-13-simplify">
## The grid is a wedding seating chart

Head table for the people with power who care (partner closely). The wealthy uncle who could derail everything but is barely interested — premium seat, minimal homework (**keep satisfied**). The cousins who care intensely but decide nothing — newsletter and a nice view (**keep informed**). Everyone else: monitor, politely.

## A business scenario is a documentary, not a memo

You don't design the new branch experience from a conference room. You film a day in the life of the problem: who appears on camera (human actors), what systems they wrestle with (computer actors), what's going wrong (problem), what good looks like and how you'd measure it (SMART objectives). Requirements extracted from footage like that arrive complete — with context, actors, and success measures attached.

## Readiness is the pre-surgery check

Brilliant operation, wrong patient condition — disaster. Readiness assessment is the anaesthetist's checklist before anyone schedules theatre: is there sponsorship (will the family consent), funding (can they pay), capacity (can the patient survive it)? Each factor: how urgent, how ready, how hard to fix. Weak readings don't necessarily cancel the surgery — they become *risks with mitigation plans*.

## Initial vs residual risk — the motorbike

Riding without a helmet: that's the **initial** risk. Put the helmet on (mitigation): riding is *still not safe* — what's left is the **residual** risk, and that's the number governance actually signs off. Any exam option implying mitigation reduces risk to zero is selling you a magic helmet.

## Interoperability — three couples share a holiday house

Do we do activities together (**operational**)? Share one shopping list (**information**)? Share the one car (**technical**)? Decide early, refine as plans firm up — and the moment the bookings get made (**Phase E**) is when "we assumed we'd have the car Tuesday" gets reconciled or the holiday falls apart.

## Capability-based planning — training for a triathlon

You don't plan "pool visit #7" — you build the *swimming capability*, and every training block leaves you measurably faster (each increment delivers value). The race-day plan (roadmap) is expressed in capabilities gained, not laps logged. And iteration? You paint the room in **coats**, not one thick layer that never dries.
</script>

<script type="text/markdown" id="md-13-traps">
## Exam traps

- **Readiness factors are rated three ways:** urgency, readiness status, degree of difficulty to fix. Options offering "probability and impact" for *readiness* are blending it with risk assessment.
- **Initial vs residual** — before vs after mitigation; residual is never zero and is what gets accepted and monitored.
- **Business scenario objectives should be SMART**, and the technique is iterative (gathering / analysing / reviewing) and workshop-driven.
- **Interoperability requirements are reconciled in Phase E** — surfacing happens earlier, but E is where conflicts get resolved.
- **The four iteration groupings** (Capability / Development / Transition Planning / Governance) and which phases each spans — straight recall.
- **Capability increments deliver value** — the same continuous-value logic as transition architectures; the two concepts deliberately rhyme and map onto each other.
- **Baseline-first vs target-first** are both legitimate — any option declaring one mandatory is wrong.
</script>

<script type="text/markdown" id="md-14-how">
## How Part 2 actually works

Eight scenarios, 90 minutes, open book, pass at 24/40 points. Each scenario has four answers scored **5 / 3 / 1 / 0**. That scoring shape changes everything about how you play it:

- You're not finding "the correct answer" — you're finding **the best of four defensible-sounding actions**. The 3-pointer is *deliberately written to be good*. The gap between 5 and 3 is usually one missed stakeholder concern or one sequencing error.
- You can score points on every question even when unsure — eliminating the 0 and the 1 gets you a coin-flip between 5 and 3. **Never leave the 0 in play.**
- ~11 minutes per scenario. The book is a *verification tool*, not a reading assignment — if you're reading the standard during the exam, you're losing. Open book is a trap wearing a gift bow. Know the document structure cold so a check takes 30 seconds.

## The anatomy of a scenario

Every scenario has the same skeleton: a context paragraph (organisation, programme, where in the ADM they are), a complication paragraph (the stakeholder concerns — **these are the marking scheme in disguise**), and a question stem ("You have been asked to recommend…"). The four answers then differ along predictable axes: which concerns they address, which phase's mechanisms they use, and whether they sequence correctly.

**Read the question stem first.** Then read the scenario hunting for two things: the phase you're in, and every named stakeholder concern. The 5-pointer addresses *all* the concerns; the 3-pointer addresses most.

## Phase signal decoder

| The scenario says… | You're in |
|---|---|
| "A Request for Architecture Work has been received…" | Phase A |
| "concerns about how the organisation operates / capabilities / value delivery" | Phase B |
| "data quality, migration, application portfolio, integration" | Phase C |
| "platform, hosting, technology standards, emerging technology" | Phase D |
| "how to organise the work / increments / transition states" | Phase E |
| "prioritisation, cost, value, scheduling, coordination with other plans" | Phase F |
| "implementation has started / a project is deviating / compliance review" | Phase G |
| "the architecture is deployed and something changed" | Phase H |
| "tailoring, principles, establishing the practice, coexisting frameworks" | Preliminary |
</script>

<script type="text/markdown" id="md-14-playbook">
## The five fingerprints of a 5-pointer

1. **Engages the stakeholders named in the scenario** — by role, addressing their stated concerns
2. **Uses the named TOGAF mechanism** for the phase (business scenarios in A, gap analysis in B–D, transition architectures in E, dispensations in G…)
3. **Addresses every concern in the scenario**, not most of them
4. **Sequences correctly** — analysis before design, stakeholders before solutions, capability before product
5. **Respects stated constraints** (deadlines, regulations, budgets) — by incorporating them, not ignoring or merely lamenting them

## The four fingerprints of distractors

1. **Premature solutioning** — products and technical designs in early phases (usually the 0)
2. **Stakeholder skipping** — "proceed; concerns can be raised at review" (usually the 1)
3. **Abdication dressed as diligence** — escalate everything, defer everything, commission another study (usually 1–3)
4. **Right action, wrong phase** — finalising the roadmap in E, selecting products in D, disposing of requirements in RM (1–3)

## A worked scenario, slow-motion

> *A retail bank has begun an EA programme. The Request for Architecture Work covering digital transformation has been approved, and the Architecture Vision phase is underway. The COO is concerned that previous transformation attempts failed because staff weren't ready for change. The CFO is concerned that the value of the programme has not been quantified. You are the Lead Architect. The sponsor asks you to recommend how to address these concerns.*
>
> **a)** Proceed to develop the Architecture Vision; both concerns can be examined in detail during Phases B–D, where business and financial architectures are developed.
> **b)** Conduct a Business Transformation Readiness Assessment addressing the COO's concern, identifying risks fed into the Capability Assessment; define target architecture value propositions and KPIs addressing the CFO's concern; reflect both in the Statement of Architecture Work.
> **c)** Commission an external consultancy to produce a change-readiness study and a detailed business case before architecture work continues.
> **d)** Conduct a Business Transformation Readiness Assessment to address the COO's concern, then proceed to develop the Architecture Vision.

**The decode:** We're in Phase A (vision underway). Two concerns: readiness (COO), value quantification (CFO). Phase A's own steps contain the mechanisms for both — readiness assessment (step 5) and value propositions/KPIs (step 9).

- **b = 5**: both concerns, both named mechanisms, landed in the phase's deliverable.
- **d = 3**: the classic near-miss — right mechanism, but only one of two concerns. *This is the 5-vs-3 gap in its purest form.*
- **a = 1**: stakeholder-skipping; defers concerns the current phase can address.
- **c = 0**: abdication — pauses the ADM to outsource what the method already provides.

Run that decode on every scenario: **phase → concerns → mechanisms → completeness.** It's the same four moves every time.
</script>

<script type="text/markdown" id="md-15-brief">
## Briefing

Forty questions, modelled on the Foundation syllabus spread. Sit it properly: **60 minutes, no notes, no peeking at modules**. The pass mark is 60% — 24 of 40 — but treat anything under 70% here as a signal to revisit the flagged modules, since mock conditions are kinder than exam nerves.

Every question's rationale names the module to revisit if you missed it. Submit once, score, then retake after revision — the wheel remembers your best run only in this session, so screenshot your score if you're tracking progress across days (until persistence is wired up on the self-hosted version).
</script>

<script type="text/markdown" id="md-16-brief">
## Briefing

Four full scenarios in real Part 2 style — longer stems, four defensible-looking options, gradient scored 5/3/1/0. The real exam gives you eight in 90 minutes, so run these at **11 minutes per scenario, open book** (have the modules or the standard available, but time-box any lookup to 30 seconds).

Work the decode from Module 14 on each: identify the phase, list every named concern, recall the phase's mechanisms, then demand completeness from the answer you pick. After scoring, read every option's rationale — the 3-pointers teach you more than the 5s, because the 3 is what you'll instinctively reach for under time pressure.
</script>

## The deliverables ledger

The documents with formal lives — who births them, who signs them. If a Part 1 question mentions a document, this table is the answer key:

| Deliverable | Produced | The one-liner |
|---|---|---|
| Request for Architecture Work | Preliminary (also F, H) | The trigger — sponsor's brief that starts Phase A |
| Organizational Model for EA | Preliminary | Who does architecture here, and how |
| Tailored Architecture Framework | Preliminary | TOGAF, adjusted to fit this enterprise |
| Architecture Principles | Preliminary | The house rules (Name / Statement / Rationale / Implications) |
| Statement of Architecture Work | Phase A (approved) | The contract to *do architecture work* |
| Architecture Vision | Phase A | The trailer that gets the film greenlit |
| Architecture Definition Document | Drafted A, developed B–D | What the architecture *is* (qualitative) |
| Architecture Requirements Specification | Developed B–D | What must be *met* (quantitative twin) |
| Architecture Roadmap | Initial in E, final in F | Work packages + transition states on a timeline |
| Implementation & Migration Plan | v0.1 in E, complete in F | The booked trip |
| Architecture Contract | Phase G | The agreement to *build to the plans* |
| Change Request | G, H | Reality requesting a word with the architecture |

          rationale:"Maturity (or performance) overlaid on the capability map, often cross-mapped to value stream stages, shows where investment lands — the bridge from strategy to roadmap." },
        { type:"ranked", tag:"Practitioner",
          q:"*In Phase B, Meridian's Head of Retail insists the team skip baseline documentation — 'we know it's broken, just design the future'. The architecture budget is under pressure. What's the best response?* Choose the best answer.",
          options:[
            { text:"Agree fully — baseline documentation of a system being replaced is waste.", pts:1,
              why:"Without a baseline there is no gap analysis, and without gaps there are no justified roadmap components." },
            { text:"Document the baseline to the level of detail needed to support gap analysis and impact assessment — no further — using the iteration and scoping decisions agreed for this cycle.", pts:5,
              why:"TOGAF expects fit-for-purpose detail: enough baseline to derive gaps and assess impacts, scoped per iteration. Pragmatic and method-correct." },
            { text:"Document the full baseline exhaustively first — the method requires it before any target work.", pts:1,
              why:"Over-applies the method; level of detail is explicitly a scoping decision, and exhaustive baselines burn the budget the stakeholder is worried about." },
            { text:"Develop the target first, then derive only the baseline elements needed to compute the gaps.", pts:3,

        { type:"ranked", tag:"Practitioner",
          q:"*The capability heat map shows Lending & Credit Decisioning at maturity 2, and the Originate Home Loan value stream shows the 'Decide' stage taking 11 days against a market norm of 1. The CFO asks what this means for investment. What's the best use of these artifacts?* Choose the best answer.",
          options:[
            { text:"Present the cross-mapping: the underperforming value stream stage traces to a low-maturity enabling capability, making it a prioritised candidate roadmap component with a quantified business case.", pts:5,

            { text:"Recommend immediate procurement of a credit decisioning product to close the gap quickly.", pts:1,
              why:"Jumps from Phase B insight to solution selection, skipping the architecture and roadmap work that makes the investment safe." },
            { text:"Commission a detailed process re-engineering study of the Decide stage before drawing conclusions.", pts:3,
              why:"More analysis isn't wrong, but the artifacts already support a prioritisation decision — the study can happen within the roadmap component." },
            { text:"Note the finding in the Architecture Definition Document and proceed to Phase C.", pts:0,
              why:"Treats a decision-ready insight as paperwork; the stakeholder asked for investment guidance and the artifacts can give it." }
          ] }
      ]
    },

        { type:"ranked", tag:"Practitioner",
          q:"*During Phase D, Meridian's infrastructure lead pushes to standardise on a specific cloud provider's proprietary event service immediately, citing a discount expiring this quarter. What's the best handling?* Choose the best answer.",
          options:[

    { id:"m08", code:"08", wheel:"E", title:"Phase E — Opportunities & Solutions", sub:"Where architecture pivots to delivery: work packages, transition states, and the initial roadmap",
      sections:[

      ],
      quiz:[
        { type:"single", tag:"Foundation",
          q:"What are the objectives of Phase E?",
          options:[
            "Finalise the Architecture Roadmap and Implementation and Migration Plan",
            "Generate the initial complete Architecture Roadmap from the Phase B–D gap analysis, and determine whether an incremental approach requires Transition Architectures delivering continuous business value",
            "Perform gap analysis between the baseline and target architectures",

          ], answer:1,
          rationale:"Initial roadmap + the incremental/transition decision. Finalising is Phase F; gap analysis happens in B–D; governance is Phase G." },
        { type:"single", tag:"Foundation",
          q:"Which phase is described as the first one directly concerned with implementation?",
          options:["Phase D","Phase E","Phase F","Phase G"], answer:1,
          rationale:"Phase E — the pivot from describing architecture to organising its delivery." },
        { type:"single", tag:"Foundation",
          q:"A Transition Architecture is best defined as:",
          options:[
            "A project plan covering one delivery increment",
            "A formally described intermediate state of the architecture at an architecturally significant point between baseline and target",
            "The first version of the target architecture",
            "A temporary technical environment used during migration"
          ], answer:1,
          rationale:"A formal architectural state — and in Phase E's framing, one that delivers continuous business value the organisation can operate in." },
        { type:"single", tag:"Foundation",
          q:"A work package is:",
          options:[
            "A set of actions identified to achieve one or more objectives",
            "A deliverable signed off by the Architecture Board",
            "A collection of artifacts describing one architecture domain",
            "A contract between sponsor and implementer"
          ], answer:0,

        { type:"single", tag:"Foundation",
          q:"In which phase do Solution Building Blocks first come into focus?",
          options:["Phase A","Phase C","Phase E","Phase G"], answer:2,
          rationale:"Phases A–D define required capability as ABBs; Phase E begins binding work packages to implementable SBBs, including make/buy/reuse decisions." },
        { type:"single", tag:"Foundation",
          q:"What does Phase E do with the gap analysis results from Phases B, C, and D?",
          options:[
            "Archives them in the Governance Log",
            "Consolidates them into an integrated view, reconciling interoperability requirements and dependencies",
            "Hands each domain's gaps to a separate delivery team",
            "Converts them directly into the final migration plan"
          ], answer:1,
          rationale:"Consolidation is E's distinctive move — separate domain gaps often merge into one work package or conflict with each other, and interoperability requirements must agree." },
        { type:"ranked", tag:"Practitioner",
          q:"*Meridian's programme office proposes transition milestones of '40% of services migrated' and '80% of services migrated' to track the modernisation. As lead architect in Phase E, what do you advise?* Choose the best answer.",
          options:[
            { text:"Define Transition Architectures as operable states delivering business value — e.g. 'coexistence: new products launch via facade' and 'customer unified: single mastering, Coastline migrated' — and let percentage tracking sit inside work packages.", pts:5,
              why:"Transition Architectures are business-valuable states, not progress percentages; tracking metrics belong at work-package level." },
            { text:"Accept the percentage milestones — they are measurable and simple to report.", pts:1,
              why:"Measurable, but a '40% migrated' state delivers no defined business value and isn't an architecture." },
            { text:"Reject interim states entirely and plan a single cutover to target to avoid transition complexity.", pts:0,
              why:"Big-bang to target for a core banking modernisation ignores Phase E's explicit incremental-approach assessment and concentrates risk." },
            { text:"Define the percentage milestones but attach a benefits statement to each.", pts:3,

        { type:"ranked", tag:"Practitioner",
          q:"*Consolidating B–D gaps in Phase E, the team finds the Data gap 'single customer mastering' and the Application gap 'replace CRM customer functions' would, if delivered separately, build two competing customer stores. What's the best action?* Choose the best answer.",

            { text:"Return both gaps to Phases B and C for rework before proceeding.", pts:3,

          options:[

            "Business planning, portfolio/project management, and operations management",

        { type:"single", tag:"Foundation",
          q:"The business value assessment matrix typically plots:",

            "Value against risk, for each work package",

          q:"Which activity formally closes the architecture development cycle?",

            "Sign-off of the Architecture Definition Document",
            "Documenting lessons learned in Phase F",
            "The post-implementation review in Phase G"
          ], answer:2,

        { type:"ranked", tag:"Practitioner",
          q:"*In Phase F, the CFO ranks work packages purely by ROI, which pushes the Coastline migration (contractually due Q4 2027) below two revenue initiatives. What's the best response?* Choose the best answer.",
          options:[

            { text:"Re-estimate the migration's ROI to include avoided penalties so it wins the ranking on the CFO's own terms.", pts:3,

            { text:"Ask ops to grant exceptions to the freeze for the migration waves.", pts:3,

    { id:"m10", code:"10", wheel:"G", title:"Phase G — Implementation Governance", sub:"Architecture Contracts, the compliance ladder, and dispensations",
      sections:[
        {title:"Theory", md:"md-10-theory"},
        {title:"Simplify", md:"md-10-simplify"},
        {title:"Worked artifacts — Meridian Bank", md:"md-10-artifacts"},
        {title:"Exam traps", md:"md-10-traps"}
      ],
      quiz:[
        { type:"single", tag:"Foundation",
          q:"What are the objectives of Phase G?",
          options:[
            "Finalise the Implementation and Migration Plan and assign business value to work packages",
            "Ensure conformance with the Target Architecture by implementation projects, and perform appropriate Architecture Governance functions for the solution and implementation-driven change requests",
            "Keep the architecture current as business and technology change",
            "Develop the solution architecture for each work package"
          ], answer:1,
          rationale:"Conformance + governance of implementation. Plan finalisation is F; keeping the architecture current is H." },
        { type:"single", tag:"Foundation",
          q:"An Architecture Contract is:",
          options:[
            "The agreement between the sponsor and the architecture team to perform architecture work",
            "A joint agreement between development partners and sponsors on the deliverables, quality, and fitness-for-purpose of an architecture",
            "A procurement contract with the selected solution vendor",
            "The sign-off page of the Architecture Definition Document"
          ], answer:1,
          rationale:"Option a is the Statement of Architecture Work (Phase A) — the most common confusion in this area." },
        { type:"single", tag:"Foundation",
          q:"An implementation includes every feature in the specification, implemented per the specification, plus several features beyond it. The compliance assessment is:",
          options:["Compliant","Consistent","Conformant","Fully conformant"], answer:2,
          rationale:"Complete plus extras = conformant. Compliant = obedient but incomplete; fully conformant = perfect correspondence with nothing extra." },
        { type:"single", tag:"Foundation",
          q:"An implementation realises only part of the specification, but everything it has implemented follows the specification exactly. This is:",
          options:["Consistent","Compliant","Non-conformant","Irrelevant"], answer:1,
          rationale:"Obedient but incomplete = compliant. Consistent additionally has implemented features that fall outside the spec; non-conformant means something was implemented contrary to spec." },
        { type:"single", tag:"Foundation",
          q:"What characterises a properly granted dispensation?",
          options:[
            "A permanent waiver from a standard, agreed informally with the delivery team",
            "A time-bound, scoped exception with conditions, granted through governance and recorded",
            "Removal of the standard from the Standards Information Base",
            "An automatic exemption for legacy systems"
          ], answer:1,
          rationale:"Narrow, dated, conditional, logged — the standard bends without governance breaking, and the SIB itself is unchanged." },
        { type:"single", tag:"Foundation",
          q:"When does Phase G end?",
          options:[
            "When the Architecture Contract is signed",
            "When the solution is fully deployed, closed by post-implementation review",
            "At the end of each programme increment",
            "When Phase H raises the first change request"
          ], answer:1,
          rationale:"G runs alongside implementation and closes with full deployment and the post-implementation review." },
        { type:"ranked", tag:"Practitioner",
          q:"*A compliance review of Meridian's WP2 build finds the team replaced the specified integration approach with a direct database link 'for performance', delivering ahead of schedule. The sponsor is delighted. What should governance do?* Choose the best answer.",
          options:[
            { text:"Assess as non-conformant (a specified feature implemented contrary to spec), require the team to either remediate or formally propose the change for architecture assessment, and record the decision in the Governance Log.", pts:5,
              why:"Contrary-to-spec is non-conformant regardless of schedule success; the legitimate route for a possibly better idea is a change proposal, not a fait accompli." },
            { text:"Assess as conformant since the delivered functionality exceeds the specification's outcomes.", pts:0,
              why:"Conformance is about correspondence with the spec, not outcome quality — and a direct DB link recreates the point-to-point pattern the architecture exists to kill." },
            { text:"Grant a retrospective dispensation to legitimise the deviation and keep the schedule.", pts:3,
              why:"At least uses a governance instrument and records the exception — but dispensations are for assessed, conditional exceptions, not retroactive amnesty for unreviewed deviations." },
            { text:"Quietly accept it; raising it would damage the architecture team's relationship with a successful delivery team.", pts:1,
              why:"Governance that yields to popularity isn't governance; the precedent invites every future team to deviate first and apologise never." }
          ] },
        { type:"ranked", tag:"Practitioner",
          q:"*Mid-implementation, the WP3 team reports the specified API management product cannot meet the dual-region failover requirement without a feature on the vendor's roadmap. What's the best governance path?* Choose the best answer.",
          options:[
            { text:"Raise it as an implementation-driven change request through Phase G governance: assess impact against the contract and requirements, route the requirement question through Requirements Management, and let the appropriate phase disposition it (interim dispensation with compensating controls if needed).", pts:5,
              why:"Exactly the G machinery: change request, impact assessment, requirements routed through the hub, recorded exception only if warranted." },
            { text:"Have the team build a custom failover layer around the product without changing the architecture documents.", pts:0,
              why:"Silent architectural divergence — the documents stop describing reality and governance loses its baseline." },
            { text:"Trigger a new ADM cycle to re-architect the integration layer.", pts:1,
              why:"Disproportionate — a single product capability gap is what change requests and dispensations exist for; a new cycle is for changes that invalidate the architecture." },
            { text:"Pause WP3 entirely until the vendor delivers the roadmap feature.", pts:3,
              why:"Safe but blunt; governance can usually craft an interim position (scoped dispensation, compensating controls, dated exit) that keeps value flowing." }
          ] }
      ]
    },
    { id:"m11", code:"11", wheel:"H", title:"Phase H — Change Management", sub:"Simplification, incremental, re-architecting — and when the wheel turns again",
      sections:[
        {title:"Theory", md:"md-11-theory"},
        {title:"Simplify", md:"md-11-simplify"},
        {title:"Worked artifacts — Meridian Bank", md:"md-11-artifacts"},
        {title:"Exam traps", md:"md-11-traps"}
      ],
      quiz:[
        { type:"single", tag:"Foundation",
          q:"What are the objectives of Phase H?",
          options:[
            "Govern implementation projects and grant dispensations",
            "Ensure the architecture lifecycle is maintained, the Architecture Governance Framework is executed, and the EA capability meets current requirements",
            "Finalise the roadmap and document lessons learned",
            "Monitor delivery teams for compliance with the Architecture Contract"
          ], answer:1,
          rationale:"Lifecycle, governance framework execution, and capability currency. Implementation governance and contracts are Phase G." },
        { type:"single", tag:"Foundation",
          q:"A change that derives additional value from an existing investment is classified as:",
          options:["Simplification","Incremental","Re-architecting","Strategic"], answer:1,
          rationale:"The investment triple: simplification reduces investment; incremental extracts more value from existing investment; re-architecting increases investment." },
        { type:"single", tag:"Foundation",
          q:"Which classification of change most clearly requires a new ADM cycle?",
          options:["Simplification","Incremental","Re-architecting","All change requires a new cycle"], answer:2,
          rationale:"Re-architecting means the architecture itself must change — the wheel turns again. Simplification and most incremental change are handled through change management." },
        { type:"single", tag:"Foundation",
          q:"According to the guideline in Phase H, a change impacting two or more stakeholders is likely to:",
          options:[
            "Be handled as a dispensation",
            "Require a full new architecture development cycle",
            "Be rejected by the Architecture Board",
            "Be classified as simplification"
          ], answer:1,
          rationale:"Stakeholder spread is the practical discriminator: multi-stakeholder impact suggests architecture change requiring a new cycle." },
        { type:"single", tag:"Foundation",
          q:"How does Phase H initiate a new architecture development cycle when one is warranted?",
          options:[
            "By re-running the Preliminary Phase",
            "By producing a new Request for Architecture Work",
            "By updating the Statement of Architecture Work",
            "By issuing a change request to Phase G"
          ], answer:1,
          rationale:"H produces a new Request for Architecture Work — which is why the wheel's H points back to A. (Revisiting Preliminary is only needed if the capability itself must change.)" },
        { type:"single", tag:"Foundation",
          q:"Which of the following is an explicit Phase H activity?",
          options:[
            "Establishing a value realization process to confirm the deployed architecture delivers the promised business value",
            "Performing gap analysis on the technology architecture",
            "Negotiating the Architecture Contract",
            "Prioritising work packages by cost/benefit"
          ], answer:0,
          rationale:"Value realization — did we get what Phase F promised? — belongs to H, alongside monitoring, risk management, and managing the governance process." },
        { type:"ranked", tag:"Practitioner",
          q:"*Eighteen months post-deployment, the core monolith vendor announces end of support two years earlier than planned, invalidating the sequencing of the remaining strangulation work and the final transition state. The CRO, Retail, and Group Technology are all affected. What should Phase H do?* Choose the best answer.",
          options:[

            { text:"Issue a change request to Phase G to accelerate the existing work packages within the current plan.", pts:3,
              why:"Acceleration may be part of the answer, but the architecture's transition states are invalidated — that's beyond what implementation governance can absorb." },
            { text:"Have Phase H redesign the affected transition architecture directly to save time.", pts:0,

            { text:"Negotiate extended support with the vendor and treat the architecture as unchanged.", pts:1,

        { type:"ranked", tag:"Practitioner",
          q:"*Post-deployment monitoring shows the integration defect-rate target (−60%) was only partially met (−45%), and ops attribute it to event contract drift between teams. How should Phase H handle this?* Choose the best answer.",
          options:[
            { text:"Feed the value-realization shortfall into change analysis: develop a change requirement (contract governance tooling/process), classify it — likely incremental — and route it through Requirements Management for disposition.", pts:5,
              why:"The H loop working as designed: monitor, analyse, develop change requirements to meet performance targets, classify, route." },
            { text:"Restate the target to −45% so the architecture is recorded as having delivered its promised value.", pts:0,
