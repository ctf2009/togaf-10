    },
    { id:"m12", code:"12", wheel:"RM", title:"Requirements Management", sub:"The hub: store and route — never dispose",
      sections:[
        {title:"Theory", md:"md-12-theory"},
        {title:"Simplify", md:"md-12-simplify"},
        {title:"Worked artifacts — Meridian Bank", md:"md-12-artifacts"},
        {title:"Exam traps", md:"md-12-traps"}
      ],
      quiz:[
        { type:"single", tag:"Foundation",
          q:"What are the objectives of the Requirements Management phase?",
          options:[
            "Prioritise, approve, and dispose of all architecture requirements",
            "Ensure the Requirements Management process is sustained across all relevant phases, manage requirements identified during any execution of the cycle, and ensure relevant requirements are available for use by each phase",
            "Produce the Architecture Requirements Specification and sign it off",
            "Validate requirements against the business case"
          ], answer:1,
          rationale:"Sustain the process, manage the flow, make requirements available. Disposal belongs to the phases — never to RM itself." },
        { type:"single", tag:"Foundation",
          q:"A requirement is found to be impossible within the current cycle's scope. Which is correct?",
          options:[
            "The Requirements Management phase rejects it",
            "The relevant ADM phase disposes of it — addressing, deferring, or rejecting — and the disposition is recorded",
            "It is deleted from the Architecture Requirements Repository",
            "It is automatically escalated to Phase H"
          ], answer:1,
          rationale:"RM stores and routes; phases dispose. The single most-tested fact about this phase." },
        { type:"single", tag:"Foundation",
          q:"What is the difference between the Architecture Requirements Repository and the Architecture Requirements Specification?",
          options:[
            "They are two names for the same deliverable",
            "The Repository is where all authorised requirements are held (part of the Architecture Repository); the Specification is a deliverable — the quantitative statements an implementation must meet",
            "The Repository holds business requirements; the Specification holds technical requirements",
            "The Specification is the draft version of the Repository"
          ], answer:1,
          rationale:"Storage structure vs deliverable. The Specification develops through B–D as the quantitative companion to the Architecture Definition Document." },
        { type:"single", tag:"Foundation",
          q:"Which phases can raise new architecture requirements?",
          options:[
            "Only Phases A and B",
            "Only the domain phases B, C, and D",
            "Any phase of the ADM, including G and H",
            "Only the Requirements Management phase itself"
          ], answer:2,
          rationale:"Requirements surface everywhere — implementation constraints in G, change analysis in H — and flow through the hub to whichever phase must act." },
        { type:"single", tag:"Foundation",
          q:"Why is Requirements Management drawn at the centre of the ADM diagram?",
          options:[
            "It is the most important phase and must be completed first",
            "It is a continuous phase interacting with every other phase throughout the cycle",
            "It is performed by the Architecture Board rather than the architecture team",
            "It contains the master version of all deliverables"
          ], answer:1,
          rationale:"Continuous and central — every phase both raises requirements into it and draws requirements from it." },
        { type:"single", tag:"Foundation",
          q:"Which technique is recommended for generating complete, well-formed business requirements early in the cycle?",
          options:["Gap analysis","Business scenarios","Capability-based planning","Risk assessment"], answer:1,
          rationale:"A good business scenario yields requirements with problem, environment, actors, and success measures attached — which is what makes them manageable downstream." },
        { type:"ranked", tag:"Practitioner",
          q:"*During Phase C, the Head of Retail demands real-time balances on all channels. Analysis shows it's achievable only after transition state T2, two years away. The current design supports 60-second freshness. What's the best handling?* Choose the best answer.",
          options:[
            { text:"The phase dispositions it as a deferral: explicitly scoped to T2, with the interim 60-second position agreed and signed off by the stakeholder, recorded with rationale in the Requirements Repository.", pts:5,
              why:"Deferral done properly — explicit, scoped, stakeholder-agreed, traceable. Neither quietly dropped nor dishonestly promised." },
            { text:"Record it in the Requirements Repository and continue — Requirements Management will resolve it in due course.", pts:1,
              why:"RM never resolves anything; parking a requirement in the hub without phase disposition is how requirements rot." },
            { text:"Reject the requirement as technically infeasible within the programme.", pts:1,
              why:"It isn't infeasible — it's deferrable; rejection burns stakeholder trust and discards a legitimate target-state requirement." },
            { text:"Accept the requirement and adjust the current design to deliver real-time balances now.", pts:3,
              why:"Stakeholder-responsive, but pulling T2-scale work into the current state without impact analysis trades one promise for several breakages." }
          ] },
        { type:"ranked", tag:"Practitioner",
          q:"*A WP5 implementation team discovers mid-build that Coastline's core can only export via FTP — conflicting with the standard marked Retirement. How should this flow through the method?* Choose the best answer.",
          options:[
            { text:"Raise it through Phase G as an implementation-driven change, route the requirement through Requirements Management, and disposition it in the appropriate phase — here a scoped, expiring dispensation with compensating controls.", pts:5,
              why:"The G→RM→disposition loop working exactly as designed, ending in a properly bounded exception." },
            { text:"The implementation team quietly uses FTP since there's no alternative — pragmatism over paperwork.", pts:0,
              why:"Silent non-conformance; the constraint never enters the method, the Governance Log stays blind, and the retired standard erodes by default." },
            { text:"Update the Standards Information Base to reinstate FTP as mainstream.", pts:1,
              why:"Rewrites enterprise standards to accommodate one legacy interface — the dispensation mechanism exists precisely to avoid this." },
            { text:"Halt the migration until Coastline's core is upgraded to support a modern transfer protocol.", pts:3,
              why:"Standards-pure, but upgrading a platform that's being decommissioned to satisfy a transfer standard inverts the value calculus — bounded exception is the proportionate tool." }
          ] }
      ]
    },
    { id:"m13", code:"13", wheel:null, title:"Key techniques", sub:"Stakeholders, scenarios, readiness, risk, interoperability, capability-based planning, iteration",
      sections:[
        {title:"The techniques", md:"md-13-theory"},
        {title:"Simplify", md:"md-13-simplify"},
        {title:"Exam traps", md:"md-13-traps"}
      ],
      quiz:[
        { type:"single", tag:"Foundation",
          q:"In the stakeholder power/interest grid, a stakeholder with high power but low interest should be:",
          options:["Partnered with closely","Kept satisfied","Kept informed","Monitored with minimal effort"], answer:1,
          rationale:"Keep satisfied — the wealthy uncle at the wedding. High/high = partner closely; low power/high interest = keep informed." },
        { type:"single", tag:"Foundation",
          q:"A complete business scenario describes the problem, the environment, the objectives, and which of the following?",
          options:[
            "The selected solution building blocks",
            "The human actors, computer actors, and their roles and responsibilities",
            "The work packages and transition architectures",
            "The cost-benefit analysis"
          ], answer:1,
          rationale:"Problem, environment, SMART objectives, human actors, computer actors, roles — developed iteratively through gathering, analysing, and reviewing." },
        { type:"single", tag:"Foundation",
          q:"In the Business Transformation Readiness Assessment, each readiness factor is rated for:",
          options:[
            "Probability and impact",
            "Urgency, readiness status, and degree of difficulty to fix",
            "Cost, value, and risk",
            "Maturity against the capability framework"
          ], answer:1,
          rationale:"Urgency / status / difficulty to fix. Probability and impact is risk-assessment language — a deliberate blend-trap." },
        { type:"single", tag:"Foundation",
          q:"Residual risk is:",
          options:[
            "The risk categorisation prior to determining mitigation actions",
            "The risk remaining after mitigation actions are applied",
            "Risk that has been transferred to a third party",
            "Risk below the threshold requiring management"
          ], answer:1,
          rationale:"After mitigation — never zero, and it's what governance accepts and monitors. The pre-mitigation rating is the initial level of risk." },
        { type:"single", tag:"Foundation",
          q:"Risk assessment in TOGAF combines which two dimensions?",
          options:[
            "Likelihood and detectability",
            "Effect and frequency",
            "Cost and schedule",
            "Urgency and difficulty"
          ], answer:1,
          rationale:"Effect (catastrophic/critical/marginal/negligible) × frequency (frequent through unlikely) → extremely high / high / moderate / low." },
        { type:"single", tag:"Foundation",
          q:"In which phase are conflicting interoperability requirements reconciled?",
          options:["Phase A","Phase C","Phase E","Phase G"], answer:2,
          rationale:"Surfaced from A and refined through B–D, but reconciled in E — where building blocks meet delivery reality." },
        { type:"single", tag:"Foundation",
          q:"Capability-based planning delivers capabilities through:",
          options:[
            "Capability increments, each delivering real usable value",
            "Technology projects sequenced by the PMO",
            "Annual budget allocations to business units",
            "Organisational restructures"
          ], answer:0,
          rationale:"Increments that each deliver value — deliberately rhyming with transition architectures, onto which they map." },
        { type:"single", tag:"Foundation",
          q:"Which iteration grouping spans Phases G and H?",
          options:[
            "Architecture Capability iteration",
            "Architecture Development iteration",
            "Transition Planning iteration",
            "Architecture Governance iteration"
          ], answer:3,
          rationale:"Capability = Preliminary + A; Development = B–F; Transition Planning = E–F; Governance = G–H." },
        { type:"ranked", tag:"Practitioner",
          q:"*Meridian's readiness assessment rates 'sponsorship and leadership' as low-readiness and hard to fix: the executive sponsoring the transformation is leaving, and no successor is named. What's the best handling?* Choose the best answer.",
          options:[
            { text:"Record it as a high transformation risk with mitigation actions (interim sponsorship arrangements, succession criteria), feed it into the Capability Assessment, and reflect the risk in the Statement of Architecture Work.", pts:5,
              why:"Readiness findings become risks with mitigations feeding Phase A's deliverables — the technique's designed flow." },
            { text:"Pause the architecture work until a new sponsor is appointed.", pts:3,
              why:"Defensible caution for a sponsorship gap, but the method's first move is risk-with-mitigation, not stoppage — pausing may itself kill the programme's momentum." },
            { text:"Continue as planned — sponsorship is an organisational matter outside architecture's remit.", pts:0,
              why:"Sponsorship is a named readiness factor precisely because transformations die without it; declaring it out of scope ignores the technique's purpose." },
            { text:"Ask the departing sponsor to formally delegate authority to the architecture team.", pts:1,

        { type:"ranked", tag:"Practitioner",
          q:"*Two segment architectures assume different things: Payments expects to share customer data in real time via events (information interoperability), while the CDP team has designed for batch synchronisation. Both designs are individually approved. Where and how should this be resolved?* Choose the best answer.",
          options:[
            { text:"In Phase E consolidation: reconcile the interoperability requirements across the building blocks, agree the binding contract (event-based with defined freshness), and update both segments' requirements through Requirements Management.", pts:5,
              why:"Interoperability reconciliation is an explicit Phase E activity, and the requirement updates flow through the hub." },
            { text:"Let each segment proceed as approved and resolve the mismatch during integration testing.", pts:0,
              why:"Shipping a known interoperability conflict to test is the expensive way to discover what the method already caught." },
            { text:"Escalate to the Architecture Board to choose which segment's design prevails.", pts:3,
              why:"Governance can arbitrate, but the answer frames it as winner-takes-all when reconciliation (a contract both can meet) is the designed mechanism." },
            { text:"Re-run Phase C for both segments to align their data architectures.", pts:1,
              why:"Disproportionate re-entry into architecture development for what is a reconciliation between approved designs." }
          ] }
      ]
    },
    { id:"m14", code:"14", wheel:null, title:"Part 2 exam technique", sub:"The decode: phase → concerns → mechanisms → completeness",
      sections:[
        {title:"How Part 2 works", md:"md-14-how"},
        {title:"The playbook", md:"md-14-playbook"}

      quiz:[
        { type:"ranked", tag:"Practitioner",
          q:"*An insurance company has completed Phase A for a claims modernisation. During Phase B, the Head of Claims reveals the operations director was never consulted and is now publicly sceptical; meanwhile the CEO wants the target operating model presented at next month's board meeting. You are the Lead Architect. What do you recommend?* Choose the best answer.",
          options:[
            { text:"Update the Stakeholder Map to include the operations director, conduct sessions to capture their concerns as requirements, and scope the Phase B work so a credible target operating model summary is ready for the board — noting any areas still under analysis.", pts:5,
              why:"Both concerns handled: the missed stakeholder enters through the stakeholder-management mechanism, and the deadline is met honestly through scoping rather than denial." },
            { text:"Proceed with Phase B as planned — the operations director can comment during the formal stakeholder review step.", pts:1,
              why:"Stakeholder-skipping; a publicly sceptical decision-influencer left until formal review is a programme-killer the scenario is begging you to address." },
            { text:"Pause Phase B and return to Phase A to redo the stakeholder analysis properly.", pts:3,
              why:"Takes the gap seriously, but the ADM doesn't require cycle re-entry to add a stakeholder — and the pause likely sacrifices the board deadline for no method benefit." },
            { text:"Ask the CEO to postpone the board presentation until the architecture is complete.", pts:0,
              why:"Ignores a stated constraint and spends sponsor capital to avoid doing the scoping work the method supports." }
          ] },
        { type:"ranked", tag:"Practitioner",
          q:"*A logistics company in Phase E has identified 14 work packages. The CFO insists everything be delivered in one programme to minimise overheads; the COO fears operational disruption and wants change spread over three years; depot managers worry daily operations will break during any cutover. What do you recommend?* Choose the best answer.",
          options:[
            { text:"Assess whether an incremental approach is required and define Transition Architectures that each deliver continuous business value, presenting the COO and depot managers with operable intermediate states and the CFO with the consolidation savings each increment unlocks.", pts:5,
              why:"Phase E's own mechanism (the incremental decision + transition states) addresses all three stakeholders' concerns through one coherent device." },
            { text:"Side with the CFO — a single programme is more efficient, and the COO's concerns can be managed through a strong communications plan.", pts:1,
              why:"Picks one stakeholder, downgrades two others to comms management, and skips Phase E's explicit incremental assessment." },
            { text:"Group the work packages into three annual programmes matching the COO's preferred timeline.", pts:3,
              why:"Incremental instinct is right, but the grouping is driven by one stakeholder's calendar rather than by transition states delivering value — and the CFO's concern goes unanswered." },
            { text:"Defer the sequencing question to Phase F, where prioritisation formally occurs.", pts:0,

        { type:"ranked", tag:"Practitioner",
          q:"*A government agency's Phase G compliance review finds a delivery team implemented the specified citizen-portal features per the architecture, but added an unspecified analytics module collecting usage data. The privacy officer is alarmed; the delivery lead argues the extras harm nothing and exceed expectations. What do you recommend?* Choose the best answer.",

            { text:"Assess as fully conformant since everything in the specification was delivered correctly.", pts:1,

            { text:"Accept the delivery lead's argument — exceeding the specification demonstrates initiative and should be encouraged.", pts:0,

        { type:"ranked", tag:"Practitioner",
          q:"*Two years after deployment, a retailer's architecture team observes: the loyalty platform underdelivers its promised value, a duplicate reporting tool from a past merger persists, and new legislation will require fundamental changes to customer data handling affecting marketing, legal, and IT. How should Phase H classify and route these?* Choose the best answer.",
          options:[
            { text:"Loyalty shortfall → value realization analysis producing change requirements (likely incremental); duplicate tool → simplification via change management; legislation → re-architecting given multi-stakeholder impact, initiating a new Request for Architecture Work.", pts:5,

            { text:"Handle all three through change management to avoid the overhead of a new architecture cycle.", pts:1,

    },

/* ============ STATE (persisted to localStorage so nobody loses their place) ============ */
const STORE_KEY = "togaf10:v1";
// Shape: { progress: { moduleId -> {score, max, passed} }, lastModule: id }
function loadStore(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch(e){ return {}; } // private-mode / disabled storage — degrade to in-memory
}
const _store = loadStore();
const progress = (_store.progress && typeof _store.progress==="object") ? _store.progress : {}; // moduleId -> {score, max, passed}
function saveStore(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify({ progress, lastModule:_store.lastModule })); }
  catch(e){ /* storage unavailable/full — stay in-memory for this session */ }
}

/* ============ MARKDOWN + MERMAID ============ */
mermaid.initialize({ startOnLoad:false, theme:"neutral", themeVariables:{ fontFamily:"Archivo, sans-serif", fontSize:"13px" } });
marked.setOptions({ gfm:true, breaks:false });
let mermaidSeq = 0;
function renderMd(srcId){
  const raw = document.getElementById(srcId).textContent;
  const html = marked.parse(raw);
  const div = document.createElement("div");
  div.className = "md";
  div.innerHTML = html;
  div.querySelectorAll("pre code.language-mermaid").forEach(code=>{
    const holder = document.createElement("div");
    holder.className = "mermaid";
    holder.id = "mmd-" + (++mermaidSeq);
    holder.textContent = code.textContent;
    code.closest("pre").replaceWith(holder);
  });
  return div;
}

/* ============ ADM WHEEL (SVG nav) ============ */
const WHEEL_PHASES = [
  {label:"P", mod:"m03"}, {label:"A", mod:"m04"}, {label:"B", mod:"m05"}, {label:"C", mod:"m06"},
  {label:"D", mod:"m07"}, {label:"E", mod:"m08"}, {label:"F", mod:"m09"}, {label:"G", mod:"m10"}, {label:"H", mod:"m11"}
];
function buildWheel(){
  const NS="http://www.w3.org/2000/svg", size=230, cx=size/2, cy=size/2, r1=58, r2=104;
  const svg=document.createElementNS(NS,"svg");
  svg.setAttribute("viewBox",`0 0 ${size} ${size}`);
  svg.setAttribute("role","navigation"); svg.setAttribute("aria-label","ADM phases");
  const n=WHEEL_PHASES.length, gap=0.035;
  WHEEL_PHASES.forEach((ph,i)=>{
    const a0=-Math.PI/2 + i*(2*Math.PI/n)+gap, a1=-Math.PI/2 + (i+1)*(2*Math.PI/n)-gap;
    const p=(r,a)=>[cx+r*Math.cos(a), cy+r*Math.sin(a)];
    const [x0,y0]=p(r2,a0),[x1,y1]=p(r2,a1),[x2,y2]=p(r1,a1),[x3,y3]=p(r1,a0);
    const path=document.createElementNS(NS,"path");
    path.setAttribute("d",`M${x0},${y0} A${r2},${r2} 0 0 1 ${x1},${y1} L${x2},${y2} A${r1},${r1} 0 0 0 ${x3},${y3} Z`);
    path.setAttribute("class","seg"); path.dataset.mod=ph.mod;
    path.setAttribute("tabindex","0"); path.setAttribute("role","button");
    path.setAttribute("aria-label","Open module: "+ph.label);
    path.addEventListener("click",()=>openModule(ph.mod));
    path.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();openModule(ph.mod);} });
    svg.appendChild(path);
    const mid=(a0+a1)/2, rm=(r1+r2)/2;
    const t=document.createElementNS(NS,"text");
    t.setAttribute("x",cx+rm*Math.cos(mid)); t.setAttribute("y",cy+rm*Math.sin(mid)+4);
    t.setAttribute("text-anchor","middle"); t.setAttribute("class","seglabel");
    t.textContent=ph.label; svg.appendChild(t);
  });
  const hub=document.createElementNS(NS,"circle");
  hub.setAttribute("cx",cx); hub.setAttribute("cy",cy); hub.setAttribute("r",r1-12);
  hub.setAttribute("class","hub"); hub.dataset.mod="m12";
  hub.setAttribute("tabindex","0"); hub.setAttribute("role","button");
  hub.setAttribute("aria-label","Open module: Requirements Management");
  hub.addEventListener("click",()=>openModule("m12"));
  hub.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();openModule("m12");} });
  svg.appendChild(hub);
  ["Requirements","Management"].forEach((w,i)=>{
    const t=document.createElementNS(NS,"text");
    t.setAttribute("x",cx); t.setAttribute("y",cy-2+i*11);
    t.setAttribute("class","hublabel"); t.textContent=w; svg.appendChild(t);
  });
  document.getElementById("wheel").appendChild(svg);
}
function refreshWheel(activeId){
  document.querySelectorAll("#wheel .seg, #wheel .hub").forEach(el=>{
    el.classList.toggle("active", el.dataset.mod===activeId);
    el.classList.toggle("done", !!(progress[el.dataset.mod] && progress[el.dataset.mod].passed));
  });
}

/* ============ NAV LIST ============ */
function buildNav(){
  const ul=document.getElementById("nav"); ul.innerHTML="";
  COURSE.modules.forEach(m=>{
    const li=document.createElement("li");
    const b=document.createElement("button");
    b.innerHTML=`<span class="code">${m.code}</span><span>${m.title}</span>`;
    if(progress[m.id] && progress[m.id].passed){
      const t=document.createElement("span"); t.className="tick"; t.textContent="✓ "+progress[m.id].score+"/"+progress[m.id].max;
      b.appendChild(t);
    }
    b.dataset.mod=m.id;
    b.addEventListener("click",()=>openModule(m.id));
    li.appendChild(b); ul.appendChild(li);
  });
}
function refreshNav(activeId){
  document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("active",b.dataset.mod===activeId));
}
function refreshScorechip(){
  const done=Object.values(progress);
  const chip=document.getElementById("scorechip");
  if(!done.length){ chip.textContent="No quizzes attempted yet"; return; }
  const s=done.reduce((a,p)=>a+p.score,0), m=done.reduce((a,p)=>a+p.max,0);
  chip.textContent=`Quizzes: ${done.length} attempted · ${s}/${m} (${Math.round(100*s/m)}%)`;
}

/* ============ MODULE VIEW ============ */
function openModule(id){
  const m=COURSE.modules.find(x=>x.id===id); if(!m) return;
  _store.lastModule=id; saveStore();
  const main=document.getElementById("main"); main.innerHTML="";
  refreshNav(id); refreshWheel(id);
  const eb=document.createElement("div"); eb.className="eyebrow"; eb.textContent="Module "+m.code; main.appendChild(eb);
  const h=document.createElement("h1"); h.className="module-title"; h.textContent=m.title; main.appendChild(h);
  const sub=document.createElement("p"); sub.className="module-sub"; sub.textContent=m.sub||""; main.appendChild(sub);

  if(m.placeholder){
    const ph=document.createElement("div"); ph.className="placeholder";
    ph.textContent="Content for this module is being written — the framework is ready for it.";
    main.appendChild(ph);
    window.scrollTo({top:0}); return;
  }

  // section tabs
  let activeSection=0;
  const tabs=document.createElement("div"); tabs.className="section-tabs";
  const body=document.createElement("div");
  function showSection(i){
    activeSection=i;
    tabs.querySelectorAll("button").forEach((b,j)=>b.classList.toggle("active",j===i));
    body.innerHTML="";
    body.appendChild(renderMd(m.sections[i].md));
    mermaid.run({ nodes: body.querySelectorAll(".mermaid") });
  }
  m.sections.forEach((s,i)=>{
    const b=document.createElement("button"); b.textContent=s.title;
    b.addEventListener("click",()=>showSection(i));
    tabs.appendChild(b);
  });
  if(m.sections.length>1) main.appendChild(tabs);
  main.appendChild(body);
  showSection(0);

  if(m.quiz && m.quiz.length) main.appendChild(buildQuiz(m));
  window.scrollTo({top:0});
}

/* ============ QUIZ ============ */
function buildQuiz(m){
  const wrap=document.createElement("section"); wrap.className="quiz";
  const head=document.createElement("div"); head.className="quiz-head";
  head.innerHTML=`<h2>Module quiz</h2><span class="note">${m.quiz.length} questions · Practitioner questions score 5 / 3 / 1 / 0</span>`;
  wrap.appendChild(head);

  const picks=new Array(m.quiz.length).fill(null);
  let submitted=false;

  m.quiz.forEach((q,qi)=>{
    const card=document.createElement("div"); card.className="qcard";
    const tag=document.createElement("span");
    tag.className="qtag "+(q.type==="ranked"?"p":"f");
    tag.textContent=(qi+1)+" · "+q.tag;
    card.appendChild(tag);
    const qt=document.createElement("div"); qt.className="qtext md";
    qt.innerHTML=marked.parseInline(q.q); card.appendChild(qt);
    const opts=document.createElement("div"); opts.className="opts";
    const letters=["a","b","c","d","e"];
    const list=(q.type==="ranked")? q.options.map(o=>o.text) : q.options;
    list.forEach((text,oi)=>{
      const b=document.createElement("button"); b.className="opt"; b.dataset.q=qi; b.dataset.o=oi;
      b.innerHTML=`<span class="key">${letters[oi]}</span><span>${text}</span>`;
      b.addEventListener("click",()=>{
        if(submitted) return;
        picks[qi]=oi;
        opts.querySelectorAll(".opt").forEach((x,j)=>x.classList.toggle("sel",j===oi));
      });
      opts.appendChild(b);
    });
    card.appendChild(opts);
    const rat=document.createElement("div"); rat.className="rationale"; rat.style.display="none"; card.appendChild(rat);
    wrap.appendChild(card);
  });

  const actions=document.createElement("div"); actions.className="quiz-actions";
  const submit=document.createElement("button"); submit.className="btn"; submit.textContent="Submit answers";
  const reset=document.createElement("button"); reset.className="btn ghost"; reset.textContent="Retake";
  reset.style.display="none";
  const result=document.createElement("span"); result.className="result";
  actions.append(submit,reset,result); wrap.appendChild(actions);

  submit.addEventListener("click",()=>{
    if(picks.some(p=>p===null)){ result.textContent="Answer every question first."; result.className="result fail"; return; }
    submitted=true;
    let score=0, max=0;
    m.quiz.forEach((q,qi)=>{
      const card=wrap.querySelectorAll(".qcard")[qi];
      const optEls=card.querySelectorAll(".opt");
      const rat=card.querySelector(".rationale");
      optEls.forEach(o=>o.disabled=true);
      if(q.type==="single"){
        max+=1;
        const ok=picks[qi]===q.answer;
        if(ok) score+=1;
        optEls[q.answer].classList.add("correct");
        if(!ok) optEls[picks[qi]].classList.add("wrong");
        rat.innerHTML=marked.parseInline(q.rationale); rat.style.display="block";
      } else {
        max+=5;
        const got=q.options[picks[qi]].pts; score+=got;
        q.options.forEach((o,oi)=>{
          const span=document.createElement("span"); span.className="pts"; span.textContent=o.pts+" pts";
          optEls[oi].appendChild(span);
          if(o.pts===5) optEls[oi].classList.add("correct");
          if(oi===picks[qi] && o.pts<5) optEls[oi].classList.add(o.pts>=3?"sel":"wrong");
        });
        rat.innerHTML=q.options.map((o,oi)=>`<strong>${"abcd"[oi]} (${o.pts}):</strong> ${o.why}`).join("<br>");
        rat.style.display="block";
      }
    });
    const pct=Math.round(100*score/max), pass=pct>=60;
    result.textContent=`${score}/${max} (${pct}%) — ${pass?"pass — the wheel approves":"below 60% — the wheel demands another lap"}`;
    result.className="result "+(pass?"pass":"fail");
    submit.style.display="none"; reset.style.display="inline-block";
    progress[m.id]={score,max,passed:pass};
    saveStore();
    buildNav(); refreshNav(m.id); refreshWheel(m.id); refreshScorechip();
  });
  reset.addEventListener("click",()=>openModule(m.id));
  return wrap;
}

/* ============ BOOT ============ */
buildWheel(); buildNav();
const _start = (_store.lastModule && COURSE.modules.some(m=>m.id===_store.lastModule)) ? _store.lastModule : "overview";
openModule(_start);
refreshScorechip(); // reflect any restored quiz scores in the header chip
</script>
