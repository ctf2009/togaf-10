<script type="text/markdown" id="md-overview">
Welcome. TOGAF has a reputation: five hundred pages of prose with the narrative energy of a tax form. The ideas buried inside are genuinely good — this course's job is to dig them out, polish them, and hand them over with the jokes the standard forgot to include. By the end you'll know the method, recognise every trap, and have a fictional bank's entire transformation in your head as the worked answer key.

## The exams

| | Part 1 — Foundation | Part 2 — Practitioner |
|---|---|---|
| Exam code | OGEA-101 | OGEA-102 (or OGEA-103 combined) |
| Format | 40 multiple choice | 8 scenario-based questions |
| Time | 60 min | 90 min |
| Pass mark | 60% (24/40) | 60% (24/40 points) |
| Open book? | No | Yes (TOGAF Standard PDF provided) |

> ⚠️ Verify current exam codes, fees, and format at theopengroup.org before booking.

Part 2 scoring: each scenario has four answers — best (5 pts), second-best (3), third (1), distractor (0). You're being tested on *judgement*, not recall — and the distractor is always there, dressed beautifully, waiting for you to panic.

## The ADM at a glance

```mermaid
flowchart TD
    P[Preliminary] --> A
    A[A: Architecture Vision] --> B[B: Business Architecture]
    B --> C[C: Information Systems Architectures]
    C --> D[D: Technology Architecture]
    D --> E[E: Opportunities and Solutions]
    E --> F[F: Migration Planning]
    F --> G[G: Implementation Governance]
    G --> H[H: Architecture Change Management]
    H --> A
    RM((Requirements Management)) -.-> A & B & C & D & E & F & G & H
```

The wheel in the sidebar is clickable — it's your course navigation. Segments fill in as you pass each module's quiz.

## Running case study: Meridian Bank

> **Meridian Bank** is a mid-tier Australian bank. Its core banking platform is a 25-year-old monolith; digital channels are bolted on via fragile point-to-point integrations. Drivers: APRA CPS 230 operational-resilience obligations, a recent acquisition of a smaller lender (Coastline Credit) requiring customer migration, and board pressure to launch digital-first products faster. The CIO has sponsored an enterprise architecture initiative to define a target state and a phased modernisation roadmap.

Every artifact example in the course uses this one scenario, so you see how outputs of one phase feed the next.

## Suggested study plan (7 weeks)

- **Weeks 1–2:** Modules 01–04. Book Part 1 now for end of week 4.
- **Week 3:** Modules 05–07 — the core architecture phases.
- **Week 4:** Modules 08–12, Mock Part 1, sit the Foundation exam.
- **Weeks 5–6:** Modules 13–14; re-do every Practitioner quiz question.
- **Week 7:** Mock Part 2 under exam conditions (90 min, open book), then sit Part 2.

<script type="text/markdown" id="md-a-theory">
## Why this phase exists

Phase A is the "project initiation" of an architecture cycle. It turns a vague *Request for Architecture Work* into an approved, scoped engagement with a compelling vision that stakeholders have signed up to. Nothing detailed gets designed here — the point is alignment and permission to proceed. Think of it as getting the family to agree on the destination before anyone argues about seat assignments.

A useful mental model: Phase A produces the **elevator pitch and the contract to do the work**; Phases B–D produce the actual architecture.

## Objectives (learn these — Foundation loves them)

1. Develop a high-level aspirational vision of the capabilities and business value to be delivered by the proposed architecture.
2. Obtain approval for a **Statement of Architecture Work** that defines a programme of works to develop and deploy the architecture outlined in the Architecture Vision.

## Inputs → Steps → Outputs

```mermaid
flowchart LR
    subgraph Inputs
        I1[Request for Architecture Work]
        I2[Business principles, goals, drivers]
        I3[Organizational Model for EA]
        I4[Tailored Architecture Framework]
        I5[Populated Architecture Repository]
    end
    PA[Phase A — 11 steps]
    subgraph Outputs
        O1[Approved Statement of Architecture Work]
        O2[Architecture Vision]
        O3[Draft Architecture Definition Document v0.1]
        O4[Communications Plan]
        O5[Capability Assessment]
    end
    Inputs --> PA --> Outputs
```

### The steps (abridged — know the flavour, not the verbatim list)

1. Establish the architecture project
2. Identify stakeholders, concerns, and business requirements
3. Confirm business goals, drivers, and constraints
4. Evaluate capabilities
5. Assess readiness for business transformation
6. Define scope
7. Confirm architecture and business principles
8. Develop the Architecture Vision
9. Define target architecture value propositions and KPIs
10. Identify transformation risks and mitigation activities
11. Develop the Statement of Architecture Work; secure approval

**Pattern worth noticing:** stakeholders come *early* (step 2). A huge number of Part 2 scenarios are won by choosing the answer that engages stakeholders and addresses their concerns before doing technical work.

## Business scenarios — the Phase A technique

If Phase A asks "what problem are we actually solving?", **business scenarios** is the technique TOGAF recommends for answering it. It's the named method for **discovering and documenting business requirements** — and it's the single most reliable 5-point answer in Part 2 whenever a scenario says requirements are unclear, disputed, or missing early in the cycle.

Its real job is to prevent the most expensive mistake in architecture: **designing a solution to a problem nobody wrote down properly.**

A complete business scenario captures seven things — *problem*, *business environment*, *technical environment*, *objectives* (SMART), *human actors*, *computer actors*, and the *roles, responsibilities and desired outcome*. It's built **iteratively** through **gathering → analysing → reviewing**, in workshops with the people who live the problem — not by architects writing fiction at their desks.

Three things to hold onto for the exam:

- It is a **technique**, not a deliverable, not a document, and not a phase. (A favourite distractor lists "Business Scenarios" as one of the six Fundamental Content documents — it isn't; it sits *within* ADM Techniques.)
- It is recommended in **Phase A**, and the technique **carries into Phase B** for requirements discovery as business architecture develops.
- Its output doesn't stay in Phase A — discovered requirements flow through **Requirements Management** into the **Architecture Requirements Specification**.

> Full anatomy, SMART objectives, and the failure modes are in **Module 13 — Key techniques**. A complete worked scenario for Meridian is in the **Worked artifacts** tab of this module.

## Key artifacts of Phase A

| Artifact | What it is |
|---|---|
| Stakeholder Map Matrix | Stakeholders × concerns × involvement level |
| Value Chain diagram | High-level orientation of how the enterprise delivers value |
| Solution Concept diagram | A one-page "marketecture" for executive consumption |
| Business Model diagram | How the enterprise creates and captures value |
| Business Capability Map | What the business *does* |
| Value Stream Map | How value flows to stakeholders |

Plus the two big **deliverables**: the Architecture Vision document and the Statement of Architecture Work. (A *deliverable* is a contractually specified work product; an *artifact* describes an aspect of the architecture; a *building block* is a reusable component of capability.)

## The Architecture Definition Document (ADD)

The ADD is the **master container** for the architecture description — the single deliverable that holds the core architectural artifacts across *all four domains* (Business, Data, Application, Technology) and *all states* (baseline, transition, target). If the Architecture Vision is the elevator pitch, the ADD is the full manuscript that the pitch is advertising.

**Why it shows up in Phase A at only v0.1.** In Phase A you build the *shell*: scope, high-level structure, and the Vision's summary models dropped in — but almost nothing is filled in yet. The substantive content is authored later, each phase maturing its own slice: **B** develops the Business section, **C** the Data and Application sections, **D** the Technology section. Hence the two questions the exam loves to pair:

- *Where is the ADD first created?* → **Phase A** (v0.1).
- *Where does the real content get developed?* → **Phases B–D.**

"Phase B" is the classic trap on the first question — because that's where real content *starts* — but **created ≠ populated**. It's created in A; it's populated in B onwards.

### What's inside it (know the flavour, not the verbatim list)

- Scope; goals, objectives, constraints
- Architecture principles
- Baseline architecture (per domain)
- Target architecture models (per domain)
- Rationale and justification for the architectural approach
- Mapping to the Architecture Repository (landscape, reference models, re-use)
- Gap analysis and impact assessment

### Its inseparable companion — the Architecture Requirements Specification (ARS)

The ADD and the ARS are a **matched pair**, developed in parallel and refined together right through the ADM. Same architecture, two complementary lenses:

| | Architecture Definition Document | Architecture Requirements Specification |
|---|---|---|
| Lens | *Qualitative* — what the architecture **is** | *Quantitative* — what the architecture **must meet** |
| Says | "Here's the design, and the architect's intent" | "Here are the measurable criteria it will be judged against" |
| Holds | Models, baseline/target, gap analysis | Success measures, requirements, service contracts, standards, assumptions |

Rule of thumb: if it's a *picture or a description of the solution*, it belongs in the **ADD**; if it's a *measurable requirement the solution has to satisfy*, it belongs in the **ARS**.

### Don't confuse the ADD with…

- **Architecture Vision** — the aspirational, executive-facing *summary* (also a Phase A deliverable, but a summary, not the detailed container).
- **Architecture Roadmap** — the ordered list of work packages / transition increments (the *delta*), consolidated in Phase E and finalised in Phase F.
- **Architecture Contract** — the governance agreement with implementers, a Phase G concern.

> **The one-liner to memorise:** the ADD is a *deliverable* that *contains artifacts*; it's *created* in Phase A (v0.1), *developed* in B–D, and *paired* with the Architecture Requirements Specification.

## 1 · Stakeholder Map Matrix (excerpt)

| Stakeholder | Class | Key concerns | Power / Interest | Engagement |

| Head of Retail Banking | Key player | Time-to-market for digital products | High / High | Partner closely |
| CRO | Decision maker | Operational resilience, migration risk | High / Medium | Keep satisfied |
| Core platform ops team | Affected party | Job impact, cutover stability | Low / High | Keep informed |
| APRA (regulator) | External | CPS 230 obligations evidence | High / Low | Keep satisfied via CRO |
| Coastline customers | Affected party | Service continuity through migration | Low / High | Communications plan |

## 2 · Solution Concept diagram

```mermaid
flowchart TB
    subgraph Channels
        MB[Mobile and Web Banking]
        BR[Branch and Contact Centre]
    end
    subgraph Target[Digital Platform — target]
        API[API and Event Layer]
        PROD[Modular Product Engines: Deposits, Lending, Payments]
    end
    subgraph Legacy[Legacy — strangled over time]
        CORE[Core Banking Monolith]
    end
    MB --> API
    BR --> API
    API --> PROD
    API -. transitional co-existence .-> CORE
    PROD --> DATA[(Customer and Product Data Platform)]
    CORE -. migrate .-> DATA
```

Note what this is *not*: no technology choices, no vendor names, no integration patterns. That's Phases C/D. A Solution Concept diagram that names Kafka has jumped the gun — a classic Part 2 distractor.

## 3 · Architecture Vision document

```
1. Problem description
2. Objective of the Statement of Architecture Work
3. Summary views (Value Chain, Solution Concept)
4. Requirements (high-level)
5. Summary of target architecture (one paragraph per domain)
6. Mapped requirements
```

> **Problem description (excerpt):** Meridian's core banking monolith constrains product launch cycles to 9–12 months against a market norm of 6–8 weeks, and its single-region deployment cannot evidence the tolerances required under CPS 230. The Coastline acquisition adds 180k customers on an incompatible platform with a contractual migration deadline of Q4 2027. Point-to-point channel integrations (47 identified) make change risky and expensive.

📄 **[Download the full worked example — Architecture Vision (Meridian Bank, .docx)](artifacts/meridian-architecture-vision.docx)** — the complete deliverable: document control, stakeholder concerns, requirements R-01–R-06, per-domain target summaries, mapped requirements, KPIs, and transformation risks.

## 4 · Statement of Architecture Work

```
1. Title and request reference
2. Project description and scope
3. Architecture Vision (reference)
4. Managerial approach
5. Change of scope procedures
6. Roles, responsibilities, deliverables
7. Acceptance criteria and procedures
8. Plan and schedule
```

> **Scope (excerpt):** This engagement covers the Retail Banking division's deposits, lending, and payments capabilities, the migration of Coastline customers, and the integration architecture between channels and product systems. Wealth Management and the Institutional division are out of scope. Architecture depth: to the level required to support investment decisions and an Implementation & Migration Plan; detailed solution design remains with delivery teams under Phase G governance.

📄 **[Download the full worked example — Statement of Architecture Work (Meridian Bank, .docx)](artifacts/meridian-statement-of-architecture-work.docx)** — the complete "contract": scope table, constraints, SAFe-integrated managerial approach, change-of-scope procedure, roles and deliverables, acceptance criteria, PI-aligned schedule, and the sponsor approval block that concludes Phase A.

## 5 · Capability Assessment (excerpt)

| Capability | Baseline maturity | Target | Gap signal |
|---|---|---|---|
| Digital product launch | 1 — ad hoc, 9–12 mo cycles | 4 — productised, under 8 wks | Major |
| Operational resilience evidencing | 2 — manual, partial | 4 — automated, CPS 230-aligned | Major |
| Customer data mastering | 2 — fragmented | 3 — single mastered source | Moderate |
| Architecture governance | 1 — informal | 3 — ARB + contracts | Major |

## 6 · Architecture Definition Document — v0.1 (the Phase A shell)

At the end of Phase A, Meridian's ADD exists as a **skeleton**: the container and scope are set and the Vision's summary models are pasted in, but every domain section is still a stub marked "to be developed."

```
Meridian ADD — v0.1
1. Scope ...................... Retail Banking; deposits, lending, payments; Coastline migration
2. Goals, objectives, constraints  incl. Q4 2027 migration deadline (a constraint, not a requirement)
3. Architecture principles ... Resilience by Design; Reuse before Buy before Build
4. Baseline architecture ..................................... [stub — developed in B / C / D]
5. Target architecture
   5.1 Business .............................................. [stub — Phase B]
   5.2 Data ................................................. [stub — Phase C]
   5.3 Application ........................................... [stub — Phase C]
   5.4 Technology ........................................... [stub — Phase D]
6. Solution Concept diagram .................................. (carried over from the Vision)
7. Gap analysis ............................................. [empty — needs a baseline + target first]
8. Mapping to Architecture Repository ....................... [initial re-use assessment]
```

Notice sections 4, 5, and 7 are essentially empty. That emptiness is **correct** for v0.1 — with no developed baseline or target yet, there are no gaps to analyse. Filling those in during Phase A would be over-reach (and a Part 2 distractor). The companion **Architecture Requirements Specification** starts alongside it, seeded from requirements R-01–R-06 in the Vision.

## 7 · Business scenario — "Originate Home Loan" (worked)

Run as a workshop series in Phase A with retail lending, credit risk, brokers, and IT operations in the room. Note what it does **not** contain: any solution. No products, no target design, no "we should build an API" — just a rigorously described problem.

### 7.1 Problem

Home-loan applicants wait **11 days** for a credit decision against a market norm of about **1 day**. Applications are re-keyed between the broker portal and the core banking monolith; income and identity documents arrive by email and are verified manually. Roughly a third of applicants who receive a competitor decision first withdraw before Meridian responds. The delay is a *symptom* — its causes are distributed across process, data, and systems, which is precisely why it needs a scenario rather than a guess.

### 7.2 Environment

| | Description |
|---|---|
| **Business** | Retail lending, via both broker-introduced and direct channels. Regulated responsible-lending obligations apply to every decision. Volume is seasonal, peaking at spring property listings. |
| **Technical** | Broker portal and core banking monolith with no shared customer record; credit bureau accessed through a manual lookup; supporting documents held in email and a shared drive; assessment worklist managed in a spreadsheet. |

### 7.3 Objectives (SMART)

| Objective | S | M | A | R | T |
|---|---|---|---|---|---|
| Reduce time-to-decision for standard applications from 11 days to ≤ 2 days | Standard (non-complex) home-loan applications | Median time from submission to decision | Within lending's remit | Peers achieve ~1 day | By Q3 2028 |
| Eliminate re-keying between channel and system of record | Broker + direct origination path | Count of manual re-entry steps → 0 | Process + integration change | Already mapped | By Q3 2028 |
| Reduce pre-decision withdrawal rate from 34% to ≤ 15% | Applications withdrawn before decision | Withdrawal % from lending MI | Follows from speed | Benchmarked | By Q1 2029 |

> "Improve the customer experience" would fail every column here. That's a mood, not an objective — and unmeasurable objectives are exactly what the technique exists to eliminate.

### 7.4 Human actors

| Actor | Place in the business model | Role in the scenario | What they need |
|---|---|---|---|
| Applicant | Customer | Supplies information, waits for a decision | Certainty, and one request for documents — not five |
| Mortgage broker | Introducer channel | Submits and chases the application | Status visibility without phoning the contact centre |
| Credit assessor | Retail lending operations | Assesses and decides | Verified income and identity data at first touch |
| Lending team leader | Retail lending operations | Allocates the worklist, manages SLAs | A queue view that isn't a spreadsheet |
| Credit risk officer | Risk function | Owns policy and responsible-lending compliance | Every decision evidenced and auditable |

### 7.5 Computer actors

| Actor | Place in the technology model | Role in the scenario |
|---|---|---|
| Broker portal | Channel | Captures application and documents |
| Core banking monolith | System of record | Holds customer, account, and product data |
| Credit bureau service | External service | Provides credit file (currently a manual lookup) |
| Document store (email + shared drive) | Ungoverned workaround | Holds supporting evidence |
| Assessment worklist (spreadsheet) | Ungoverned workaround | Tracks queue and allocation |

### 7.6 Roles, responsibilities, and desired outcome

Assessors decide; brokers submit and inform; risk sets policy and audits. The desired outcome is that a **standard application submitted through any channel reaches a decision within two days, with income and identity verified once, evidence captured automatically, and every decision traceable to the policy in force at the time.**

### 7.7 Where the output goes

The scenario is not the destination. Its findings become requirements, which flow through **Requirements Management** into the **Architecture Requirements Specification**, and its objectives become the KPIs in the Architecture Vision:

| From the scenario | Becomes |
|---|---|
| Decision in ≤ 2 days | Feeds KPI "home-loan Decide stage ≤ 2 days"; refines requirement **R-01** |
| Verify income and identity once | Contributes to **R-04** (single mastered customer source) |
| No re-keying between channel and record | Contributes to **R-05** (integration only via the shared API and event layer) |
| Every decision evidenced and auditable | Reinforces **R-02** (CPS 230 evidencing) |

Notice the discipline: the scenario surfaced the *need*, and the requirements it produced are still **solution-free**. Choosing how to satisfy them — a decisioning engine, an event-driven document service, a product — is Phase C/D/E work.
</script>

<script type="text/markdown" id="md-a-traps">
## Exam traps

- **"Vision = detailed target architecture."** No — Phase A is high-level and aspirational; the Architecture Definition Document is only drafted at v0.1 here and matured in B–D.
- **Business scenarios** is the recommended *technique* in Phase A for discovering and articulating business requirements. If a scenario question mentions unclear requirements early in the cycle, the business-scenarios answer is usually the 5-pointer.
- **The Statement of Architecture Work is the deliverable that gets *approved*** — effectively the contract between the architecture organisation and the sponsor.
- The **readiness assessment** (step 5) uses business transformation readiness factors — questions about "can the organisation absorb this change?" point here.
- Phase A both **consumes and refines** business principles, goals, and drivers — it doesn't invent them from scratch.
</script>

<script type="text/markdown" id="md-01-theory">
## What an "enterprise" is

TOGAF defines an enterprise as the highest level of an organisation's scope — any collection of organisations with a common set of goals. A whole corporation, a division, a government agency, or a chain of organisations linked by shared ownership all qualify. For Meridian, "the enterprise" includes Coastline Credit the moment the acquisition completes — which is precisely why the architecture work can't treat Coastline as someone else's problem.

## Why enterprise architecture exists

The purpose of EA is to optimise a fragmented legacy of processes and systems (manual and automated) into an integrated environment that is responsive to change and supportive of the business strategy. Two recurring exam phrasings:

- EA enables the right balance between **IT efficiency and business innovation**.
- A good architecture provides a **stable foundation for change** — the apparent paradox the exam likes: structure is what makes safe, fast change possible.

## The structure of the TOGAF Standard, 10th Edition

The big change from 9.2: one monolithic book became a modular library.

```mermaid
flowchart TB
    subgraph FC[TOGAF Fundamental Content — the stable, examinable core]
        D1[Introduction and Core Concepts]
        D2[Architecture Development Method]
        D3[ADM Techniques]
        D4[Applying the ADM]
        D5[Architecture Content]
        D6[EA Capability and Governance]
    end
    subgraph SG[TOGAF Series Guides — expanding best practice]
        G1[Business Architecture]
        G2[Agile and the ADM]
        G3[Security, Digital, Microservices, and more]
    end
    FC --- SG
```

The split encodes a principle: the Fundamental Content holds the **universal concepts** that change slowly; the Series Guides hold **how-to guidance** that can evolve and grow without re-issuing the standard. The exams are anchored on the Fundamental Content.

## The four architecture domains (BDAT)

| Domain | Describes | Meridian example |
|---|---|---|
| **B**usiness | Strategy, governance, organisation, key processes | Product launch value stream, branch operating model |
| **D**ata | Logical and physical data assets, data management | Customer master, transaction history, Coastline's books |
| **A**pplication | The application portfolio and its interactions | Core monolith, channel apps, CRM |
| **T**echnology | The platform: software/hardware/network capabilities and services | Hosting, middleware, networks, runtime platforms |

Data + Application together are the **Information Systems Architectures** — handled together in Phase C.

## What TOGAF is (and isn't)

It's a vendor-neutral *method and framework* — the ADM is its core, and everything else supports the ADM. It is deliberately generic: you're expected to **tailor** it (that's a Preliminary Phase job) and to integrate it with whatever else the organisation runs (Scaled Agile, ITIL, project methods). It is not a prescriptive solution catalogue, not an ArchiMate-style modelling language (that's a separate Open Group standard), and not a maturity model.
</script>

<script type="text/markdown" id="md-02-adm">
## The ADM in one pass

The Architecture Development Method is the heart of TOGAF — an iterative cycle for developing an enterprise architecture. Learn this table cold; it's the skeleton key to a third of Part 1. One-line purpose per phase:

| Phase | One-liner |
|---|---|
| Preliminary | Set up the architecture capability: tailor TOGAF, define principles |
| A — Vision | Scope the cycle, win stakeholders, get the Statement of Architecture Work approved |
| B — Business | Baseline + target business architecture, gap analysis |
| C — Information Systems | Same pattern for data and application architectures |
| D — Technology | Same pattern for the technology platform |
| E — Opportunities & Solutions | Turn gaps into work packages and transition architectures; initial roadmap |
| F — Migration Planning | Finalise the roadmap and the Implementation & Migration Plan |
| G — Implementation Governance | Govern delivery via Architecture Contracts and compliance reviews |
| H — Change Management | Keep the architecture current; decide when a new cycle is needed |
| Requirements Management | The hub: every phase raises and consumes requirements through it |

Three structural things to internalise:

1. **B, C, and D share one pattern:** develop baseline, develop target, perform gap analysis, define roadmap components. Learn it once, apply it three times.
2. **The ADM is iterative** — around the whole cycle, between phases, and within a phase. Scope, level of detail, schedules, and milestones are decided per iteration in line with the established Architecture Capability.
3. **Requirements Management is a continuous phase**, not a sequential step — it stores, manages, and feeds requirements; it doesn't *dispose* of them. Disposal (address, defer, reject) happens in the relevant phase.
</script>

<script type="text/markdown" id="md-02-content">
## Deliverables, artifacts, building blocks

The three content terms the exam tests relentlessly:

| Term | Definition | Examples |
|---|---|---|
| **Deliverable** | A work product that is contractually specified, formally reviewed, and signed off | Statement of Architecture Work, Architecture Definition Document |
| **Artifact** | A work product describing an aspect of the architecture | Catalogs, matrices, diagrams |
| **Building block** | A (potentially reusable) component of business, IT, or architectural capability | "Customer master data service" |

> **First sighting: the Architecture Definition Document (ADD).** You'll meet this name constantly from here on, so pin it down now: the ADD is the **main deliverable that holds the architecture description itself** — the container for the models and artifacts covering all four domains (Business, Data, Application, Technology) and all states (baseline, transition, target). It's *created* in Phase A as a near-empty v0.1 shell, then *filled in* across Phases B–D, and it has a quantitative twin, the **Architecture Requirements Specification** (the ADD says what the architecture *is*; the ARS says what it must *meet*). Full treatment in Module 04. Note the relationship being illustrated here: the ADD is a **deliverable** that *contains* **artifacts**.

Artifacts come in exactly three classes — and the classification logic is examinable:

- **Catalogs** — lists of things (Application Portfolio Catalog)
- **Matrices** — relationships between things (Application/Function Matrix)
- **Diagrams** — pictures of things (Solution Concept diagram)

Building blocks split into:

- **Architecture Building Blocks (ABBs)** — describe *required capability*, technology-aware but product-agnostic; defined mainly in Phases A–D.
- **Solution Building Blocks (SBBs)** — the *products and components that implement* the capability; defined mainly in Phase E onwards.

Meridian translation: "an event streaming capability for transaction distribution" is an ABB. "Confluent Kafka on AWS MSK" is an SBB. A scenario answer that jumps to the SBB during Phase B–D is usually a low scorer.

## The Architecture Content Framework

A structural model for architectural content that drives consistency: deliverables contain artifacts; artifacts describe building blocks; everything is underpinned by the **content metamodel**, which defines the entity types (actors, business services, applications, technology components…) and their relationships so that artifacts produced in one phase connect formally to those in another.

## Views and viewpoints (don't skip — it's on the paper)

The chain the exam wants: **stakeholders** have **concerns** → concerns are addressed by choosing **viewpoints** → viewpoints are used to construct **views**.

- A **viewpoint** is *where you stand*: the perspective and conventions for constructing one kind of view — the camera position and lens. Viewpoints are **reusable** across architectures (a "security viewpoint" works at every building you photograph).
- A **view** is *what you see from there*: a representation of the system from the perspective of a related set of concerns — the actual photograph, specific to *your* architecture.

The discriminator question is always "which one is reusable?" — the tripod position (viewpoint), never the photo (view). And the ordering question: identify stakeholders and concerns *first*, then select viewpoints, then create views. Choosing views before knowing whose concerns they address is taking photos before knowing who's buying them.
</script>

<script type="text/markdown" id="md-02-repo">
## The Enterprise Continuum

A classification system for architecture and solution assets, ordered from generic to specific:

```mermaid
flowchart LR
    F[Foundation Architectures] --> CS[Common Systems Architectures] --> IA[Industry Architectures] --> OS[Organization-Specific Architectures]
```

It has two parallel strands: the **Architecture Continuum** (ABBs — e.g. a generic banking industry reference model) and the **Solutions Continuum** (SBBs — e.g. a specific core banking product). The point: before building anything, look left — is there a more generic asset to adapt? For Meridian, BIAN (an industry architecture for banking) would sit in the Industry column.

## The Architecture Repository

Where all this lives. Know the parts and what each holds:

| Part | Holds |
|---|---|
| Architecture Metamodel | The tailored framework and content metamodel |
| Architecture Capability | The repeatable processes, skills, roles supporting the repository |
| Architecture Landscape | Architectural representations of assets in use or planned |
| Standards Information Base | The standards new architectures must comply with |
| Reference Library | Guidelines, templates, patterns, reference models to be leveraged |
| Governance Log | Record of governance activity — decisions, compliance assessments |
| Architecture Requirements Repository | All authorised architecture requirements |
| Solutions Landscape | The SBBs supporting the Architecture Landscape |

**The Architecture Landscape has three levels** — a favourite Foundation question:

- **Strategic Architectures** — long-term summary view for direction-setting at the executive level
- **Segment Architectures** — detailed operating models for portfolios or programs
- **Capability Architectures** — increment-level detail showing how a specific capability is realised

## Architecture Capability and governance

Running architecture well requires an operating capability: an **Architecture Board** (cross-organisation, oversees implementation, accountable for governance), **Architecture Contracts** (joint agreements between development partners and sponsors on deliverables and quality), and **compliance reviews** against the standards in the SIB. Governance turns architecture from documentation into enforcement — this becomes concrete in Phase G.
</script>

<script type="text/markdown" id="md-03-theory">
## Why this phase exists

The Preliminary Phase answers: *where, what, why, who, and how* do we do architecture in this enterprise — before any actual architecture gets developed. It's run once to stand up the capability, and revisited when something fundamental changes (new operating model, acquisition, framework change).

## Objectives

1. Determine the **Architecture Capability** desired by the organisation — review the organisational context, identify the elements of scope, and identify the established frameworks, methods, and processes that intersect with architecture work.
2. **Establish** the Architecture Capability — organisational model, governance, principles, tailored framework, and tools.

## Main activities

- **Define the enterprise scope** — which organisational units are touched (for Meridian: Retail division + Coastline; Institutional out of scope).
- **Identify intersecting frameworks** — project management, ITIL/service management, agile delivery methods, risk frameworks. TOGAF expects to *coexist*, and the tailoring records how.
- **Tailor TOGAF** — terminology, process (which phases get emphasis, how iteration works), and content (which artifacts are mandatory vs optional). Adopting TOGAF unmodified is wearing the suit straight off the rack, pins and all.
- **Define Architecture Principles** — see below.
- **Implement architecture tools** — repository tooling, modelling tools.

## Architecture Principles

General rules and guidelines that inform and support the way the organisation fulfils its mission. The four-part structure is pure exam gold:

| Component | Purpose |
|---|---|
| **Name** | Memorable, represents the essence of the rule |
| **Statement** | Succinctly and unambiguously states the rule |
| **Rationale** | The business benefits — why this rule exists |
| **Implications** | What it requires of the business and IT — the cost of compliance |

Five quality criteria for a good principle set: **understandable, robust, complete, consistent, stable**. (Robust = supports good decision-making even in complex situations; stable = endures, with a managed process for amendment.)

## Outputs

- Organizational Model for Enterprise Architecture (scope, roles, responsibilities, governance)
- Tailored Architecture Framework, including Architecture Principles
- Initial Architecture Repository
- Restatement of business principles, goals, and drivers
- Request for Architecture Work (the trigger document for Phase A, from the sponsoring organisation)
- Architecture Governance Framework
</script>

<script type="text/markdown" id="md-03-artifacts">
## 1 · Architecture Principles (excerpt from Meridian's set of 12)

> **Name:** Resilience by Design
> **Statement:** Every critical business service must meet its defined impact tolerance through architecture, not heroics — failure modes are designed for, tested, and evidenced.
> **Rationale:** APRA CPS 230 requires Meridian to set and meet impact tolerances for critical operations; resilience retrofitted after design is unreliable and unevidenceable.
> **Implications:** Critical services must be identified and classified; architectures must include failure-mode analysis; evidence generation must be automated; this constrains hosting and deployment choices and adds design cost.

> **Name:** Reuse, Then Buy, Then Build
> **Statement:** Solutions reuse existing enterprise assets first, adopt proven commercial products second, and build bespoke only where differentiation justifies it.
> **Rationale:** Meridian's 47 point-to-point integrations are the legacy of repeated bespoke builds; reuse reduces cost, risk, and time-to-market.
> **Implications:** A searchable Reference Library and Standards Information Base must exist; business cases must demonstrate the reuse/buy assessment; "build" requires explicit Architecture Board approval.

Note both follow Name / Statement / Rationale / Implications exactly — write your own this way and the structure becomes automatic.

## 2 · Organizational Model for EA (excerpt)

| Element | Decision |
|---|---|
| Scope of organisations impacted | Retail Banking division; Coastline Credit; Group Technology |
| Maturity assessment | Level 1 (informal); target Level 3 within 18 months |
| Roles | Lead Enterprise Architect, domain architects (B/D/A/T), Architecture Board of 7 |
| Governance | Architecture Board fortnightly; compliance review gate in delivery lifecycle |
| Constraints | Existing SAFe delivery model retained; EA cadence aligned to PI boundaries |

## 3 · Tailoring decisions (excerpt)

| Tailoring | Decision | Why |
|---|---|---|
| Process | Phases B–D run iteratively per segment, not big-bang | SAFe PI cadence; avoids 6-month architecture phases |
| Content | Mandatory artifacts: stakeholder map, capability map, application/function matrix, gap analysis per phase | Minimum viable governance |
| Terminology | "Transition state" used in place of "transition architecture" in exec material | Matches existing Meridian programme language |
| Coexistence | Architecture Contracts implemented as SAFe enabler epics with compliance criteria | One backlog, not two governance systems |
</script>

<script type="text/markdown" id="md-03-traps">
## Exam traps

- **The Preliminary Phase produces no architectures.** It produces the *capability* to produce architectures. Any answer with the Preliminary Phase designing a target state is wrong.
- **Principles have exactly four components** — Name, Statement, Rationale, Implications. "Owner", "metrics", or "priority" in an option are distractors.
- **The Request for Architecture Work** is sent by the *sponsoring organisation* to the architecture organisation, and it *triggers* Phase A. It's an output of the Preliminary Phase (and can also be generated by Phases F and H to trigger new cycles).
- **Tailoring is expected, not exceptional.** Scenario questions about TOGAF clashing with an existing method (SAFe, PRINCE2, ITIL) are usually won by the answer that tailors and integrates in the Preliminary Phase — not the one that replaces the incumbent method or adopts TOGAF unmodified.
- Revisiting the Preliminary Phase is legitimate when the organisational context changes significantly (e.g. Meridian acquiring Coastline) — the capability itself may need re-scoping.
</script>

<script type="text/markdown" id="md-05-theory">
## Why this phase exists

Phase B describes how the enterprise needs to *operate* to achieve its business goals — before any system gets touched. It's the architecture domain everything else hangs off: data, application, and technology architectures exist to serve what Phase B defines. Skipping or skimping it is the root cause of "we built the platform but the business didn't change" — the IT equivalent of renovating the kitchen for a family that eats out.

## Objectives (the B/C/D shared pattern)

1. Develop the **target Business Architecture** describing how the enterprise needs to operate to achieve the business goals, respond to the strategic drivers set out in the Architecture Vision, and address the stakeholder concerns.
2. Identify **candidate Architecture Roadmap components** based on gaps between the Baseline and Target Business Architectures.

Memorise this shape once — Phases C and D have the same two objectives with the domain swapped. The exam exploits this symmetry constantly.

## The shared step pattern (B, C, and D)

1. Select reference models, viewpoints, and tools
2. Develop the **Baseline** architecture description
3. Develop the **Target** architecture description
4. Perform **gap analysis**
5. Define candidate roadmap components
6. Resolve impacts across the Architecture Landscape
7. Conduct formal stakeholder review
8. Finalize the architecture
9. Create/update the **Architecture Definition Document**

Baseline first, then target, then gaps — though in practice (and in TOGAF's iteration guidance) target-first is legitimate when the future state drives the work. Step 6 matters: your segment's architecture can break someone else's — check the Landscape.

## The core Business Architecture concepts

| Concept | What it answers | Stability |
|---|---|---|
| **Business capability** | *What* the business does | Very stable — survives reorgs |
| **Value stream** | *How* value flows to a stakeholder, end to end | Stable |
| **Organisation map** | *Who* — units, partners, and their relationships | Changes with reorgs |
| **Business process** | *How, in detail* — sequenced activities | Changes frequently |
| **Information map** | What information the business needs | Stable |

The power move is the **cross-mapping**: capabilities × value stream stages shows which capabilities enable which value delivery — and heat-mapping that grid against maturity shows exactly where investment should land. This is TOGAF 10's biggest content upgrade over 9.2, and it'll feel native if you've modelled in ArchiMate (capability ↦ ArchiMate capability, value stream ↦ value stream element — the notations align deliberately).

## Gap analysis (the technique)

Draw a matrix: baseline building blocks down the side **plus a "New" row**; target building blocks across the top **plus an "Eliminated" column**. Where baseline meets target: carried over (included). Baseline items with no target home land in **Eliminated** — each one must be a deliberate decision, or you've found an accidental omission. Target items with no baseline source land in **New** — these are the gaps, and gaps become roadmap components in Phase E.
</script>

<script type="text/markdown" id="md-05-artifacts">
## 1 · Business Capability Map (Level 1, heat-mapped)

| Capability (L1) | Maturity | Target | Investment signal |
|---|---|---|---|
| Customer Management | 2 | 4 | **Hot** — fragmentation across Meridian/Coastline |
| Product Origination | 1 | 4 | **Hot** — 9–12 month launch cycle |
| Payments Execution | 3 | 4 | Warm — capacity and resilience evidencing |
| Lending & Credit Decisioning | 2 | 3 | Warm |
| Risk & Compliance Management | 2 | 4 | **Hot** — CPS 230 |
| Channel Management | 2 | 4 | Warm |
| Treasury & Liquidity | 3 | 3 | Cold — fit for purpose |

Capabilities are *what*, not *who* or *how* — "Product Origination" exists whether it's done by a branch, an app, or a COBOL batch job. That stability is why the capability map survives every reorg and remains the anchor for heat-mapping.

## 2 · Value Stream: Originate Home Loan

```mermaid
flowchart LR
    S1[Apply] --> S2[Verify and Assess] --> S3[Decide] --> S4[Offer and Accept] --> S5[Settle] --> S6[Onboard]
```

| Stage | Entrance / exit criteria | Enabling capabilities |
|---|---|---|
| Apply | Intent expressed / complete application | Channel Mgmt, Customer Mgmt |
| Verify & Assess | Complete application / verified position | Customer Mgmt, Risk & Compliance |
| Decide | Verified position / credit decision | Lending & Credit Decisioning |
| Offer & Accept | Decision / signed acceptance | Product Origination, Channel Mgmt |
| Settle | Acceptance / funds disbursed | Payments Execution |
| Onboard | Funds disbursed / serviced account | Customer Mgmt, Channel Mgmt |

The stage × capability mapping is the artifact that makes investment arguments concrete: "Decide" takes 11 days at Meridian vs 1 day at digital competitors, and the heat map shows Lending & Credit Decisioning at maturity 2 — that's a funded roadmap component writing itself.

## 3 · Organization Map (excerpt)

```mermaid
flowchart TB
    GRP[Meridian Group] --> RET[Retail Banking]
    GRP --> CST[Coastline Credit - integrating]
    GRP --> TECH[Group Technology]
    RET --> BR[Branch Network]
    RET --> DIG[Digital Channels]
    CST -. migration relationship .-> RET
    TECH -. shared service .-> RET & CST
```

## 4 · Gap Analysis (Business Architecture excerpt)

| Baseline ↓ / Target → | Unified Customer Mgmt | Digital Product Origination | **Eliminated** |
|---|---|---|---|
| Meridian customer mgmt (branch-centric) | Included — evolve | | |
| Coastline customer mgmt | Included — absorb | | |
| Paper-based origination | | | **Deliberately eliminated** |
| **New** | | **Gap: digital origination capability** | |

The "New" cell becomes a candidate roadmap component. The "Eliminated" cell is signed off as deliberate — if paper origination had simply not appeared in the target, gap analysis just caught the omission.
</script>

<script type="text/markdown" id="md-05-traps">
## Exam traps

- **Capability vs process vs value stream.** Capability = *what* (stable); value stream = end-to-end *flow of value* to a stakeholder; process = detailed *how*. A question describing "a stable view of what the business does, independent of organisation structure" wants *capability map*.
- **The two objectives of B (and C, and D)** are: develop the target architecture for that domain, and identify candidate roadmap components from gaps. Options mentioning "finalise the roadmap" (Phase F) or "select solutions" (Phase E) are wrong.
- **Gap analysis mechanics**: the "Eliminated" column and "New" row exist to catch *accidental omissions* — that's its stated purpose, not just bookkeeping.
- **Where do roadmap components get consolidated?** B, C, and D produce *candidates*; Phase E consolidates them into the initial Architecture Roadmap.
- **Business Architecture is a prerequisite** for the other domains — exam answers that start Phase C/D work before B has established the business context score low in scenarios.
- Knowledge of the **Business Scenarios** technique carries from Phase A into B for requirement discovery.
</script>

<script type="text/markdown" id="md-06-theory">
## Why this phase exists

Phase C defines the Information Systems Architectures — **two** architectures, Data and Application — describing how the enterprise's information assets and application systems will enable the Business Architecture and the Architecture Vision.

The exam's favourite structural fact: Data and Application can be developed **in either order, or simultaneously**. Theory says data-first (applications exist to serve data); practice often runs application-first (the portfolio is where the money is). TOGAF blesses both.

Both halves follow the same nine steps as Phase B — baseline, target, gap analysis, candidate roadmap components, update the Architecture Definition Document.

## Data Architecture

Objectives follow the B/C/D pattern, applied to data. The named key considerations:

- **Data management** — who masters what, how data is defined, structured, and governed across the enterprise
- **Data migration** — front of mind when applications are consolidated or replaced: cleansing, transformation rules, target quality criteria. (For Meridian, Coastline's 180k customer records make this a first-class architectural concern, not a delivery detail.)
- **Data governance** — structure, management system, and *people* (skills) to ensure the transformation sticks

Key artifacts:

| Artifact | Class | Shows |
|---|---|---|
| Data Entity / Data Component Catalog | Catalog | The data inventory |
| Data Entity / Business Function Matrix | Matrix | Which functions create/use which entities |
| Application / Data Matrix | Matrix | Which applications master/access which data (CRUD) |
| Conceptual & Logical Data Diagrams | Diagram | Entity relationships at two abstraction levels |
| Data Dissemination Diagram | Diagram | How data is replicated/distributed to applications |
| Data Migration Diagram | Diagram | Flow from source to target through cleansing/transform |
| Data Security & Lifecycle Diagrams | Diagram | Classification and state transitions |

## Application Architecture

Same objective pattern, applied to the application portfolio. The target describes the *kinds* of application systems needed — as ABBs ("logical application components"), not product selections.

| Artifact | Class | Shows |
|---|---|---|
| Application Portfolio Catalog | Catalog | The application inventory |
| Application / Function Matrix | Matrix | Which applications support which business functions |
| Application Interaction Matrix | Matrix | Which applications talk to which |
| Application Communication Diagram | Diagram | The integration picture — the famous spaghetti |
| Application & User Location Diagram | Diagram | What runs where, who uses it where |
| Application Use-Case Diagram | Diagram | How actors use applications |
</script>

<script type="text/markdown" id="md-06-artifacts">
## 1 · Application Communication Diagram — baseline vs target

Baseline (the 47-integration problem, abridged):

```mermaid
flowchart LR
    MOB[Mobile App] --> CORE[Core Monolith]
    WEB[Web Banking] --> CORE
    MOB --> CRM[CRM]
    WEB --> CRM
    CRM --> CORE
    BR[Branch System] --> CORE
    BR --> CRM
    CC[Contact Centre] --> CORE
    CC --> CRM
    CST[Coastline Core] --> CORE
```

Target:

flowchart LR

Note the discipline: "Integration Layer — API and events" is an ABB. Naming Kafka, MuleSoft, or an API gateway product here would be premature — that's Phase E's solution work. (Yes, this will feel unnatural. The exam rewards the restraint.)

## 2 · Data Entity Catalog (excerpt)

| Data entity | Master (baseline) | Master (target) | Classification |
|---|---|---|---|
| Customer | Core monolith *and* CRM *and* Coastline core (conflicting) | Customer Data Platform | Confidential — PII |
| Account | Core monolith / Coastline core | Product engines (per domain) | Confidential |
| Transaction | Core monolith | Payments Engine, event-distributed | Confidential |
| Product definition | Spreadsheets + core config | Product catalogue service | Internal |

Three masters for Customer is the single most expensive fact in Meridian's baseline — and the gap analysis row that justifies the Customer Data Platform.

## 3 · Application / Data (CRUD) Matrix (excerpt)

| | Customer | Account | Transaction |
|---|---|---|---|
| Mobile App | R | R | R |
| Core Monolith (baseline) | **CRUD** | **CRUD** | **CRUD** |
| CRM (baseline) | CRU — *conflict* | R | — |

| Deposits Engine (target) | R | **CRUD** | C |

The matrix makes mastering conflicts visible at a glance — two applications with C/U rights over the same entity is an architecture smell the exam expects you to spot.

## 4 · Data Migration Diagram — Coastline

```mermaid
flowchart LR
    SRC[(Coastline core)] --> EXT[Extract] --> CLN[Cleanse and de-duplicate] --> MAP[Transform to target model] --> VAL[Validate against quality criteria] --> TGT[(Customer Data Platform)]
    VAL -. exceptions .-> REM[Remediation queue]
```

Plus the migration concerns recorded as architecture requirements: matching rules for duplicate customers across the two banks (fuzzy matching on name/DOB/contact — you've lived this one), quality thresholds as acceptance criteria, and cutover sequencing as input to Phase F.
</script>

<script type="text/markdown" id="md-06-traps">
## Exam traps

- **Phase C = Data AND Application**, developable in either order or together. Options forcing a mandatory sequence are wrong.
- **Data migration, data management, and data governance** are the explicitly named Data Architecture considerations — a scenario about consolidating systems after an acquisition is fishing for *data migration planning and quality criteria*.
- **Logical application components (ABBs), not products.** "Define which CRM product to buy" is Phase E bait inside a Phase C question.
- **Artifact classification still applies**: Application Portfolio = catalog; Application Interaction = matrix; Application Communication = diagram.
- The **Architecture Definition Document accretes** — Phase C *updates* the same document begun in Phase A, it doesn't start a new one. Same in D.
- Impacts ripple: a new Customer Data Platform affects segment architectures elsewhere in the Landscape — step 6 (resolve impacts) is the named home for that concern.
</script>

<script type="text/markdown" id="md-07-theory">
## Why this phase exists

Phase D defines the Technology Architecture: the logical and physical technology capabilities — software, hardware, network, platform services — that enable the application and data components and the Architecture Vision. It's the last of the three domain-development phases and follows the identical nine-step pattern.

Two objectives, same shape as B and C: develop the target Technology Architecture; identify candidate roadmap components from the gaps.

## What "technology" means here

The target is expressed as **technology services and logical technology components** — capability statements like "container runtime platform", "event streaming service", "secrets management service" — which later bind to **physical technology components** (actual products/versions) as solutions are selected. Phase D may identify candidate physical components, but product selection is substantially Phase E territory.

TOGAF 10 also calls out **emerging technologies** here: Phase D is where you decide which genuinely change the architecture (and earn a place in the target) versus which are noise. The exam does not care what's printed on this year's conference lanyards.

## Key artifacts

| Artifact | Class | Shows |
|---|---|---|
| Technology Standards Catalog | Catalog | Approved standards, versions, lifecycle status |
| Technology Portfolio Catalog | Catalog | Technology in use — the estate inventory |
| Application / Technology Matrix | Matrix | Which applications depend on which technology |
| Environments & Locations Diagram | Diagram | What runs where — sites, regions, environments |
| Platform Decomposition Diagram | Diagram | The technology platform layered into services |
| Network Computing / Hardware Diagram | Diagram | Physical topology |

The **Technology Standards Catalog** has a governance life beyond Phase D — its contents feed the Standards Information Base, and Phase G compliance reviews assess implementations against it. Lifecycle states matter: a standard can be emerging, mainstream, containment (no new use), or retirement.
</script>

<script type="text/markdown" id="md-07-traps">
## Exam traps

- **Services and logical components, not products.** Phase D defines the required technology *capability*; binding to physical products is substantially Phase E. "Select the cloud vendor" inside Phase D is usually the 0-or-1-point option.
- **The Technology Standards Catalog feeds the Standards Information Base**, and compliance against it is assessed in Phase G — a cross-phase chain the exam likes.
- **Same nine steps, same two objectives** as B and C. If you've memorised the pattern once, D is free marks.
- **Emerging technology** evaluation is explicitly a Phase D concern in TOGAF 10 — but the test is whether it changes the *architecture*, not whether it's interesting.
- **Environments & locations** questions (where things run, regional resilience) belong to Phase D artifacts — and good answers trace the topology back to principles and requirements rather than asserting it as preference.
</script>

<script type="text/markdown" id="md-08-theory">
## Why this phase exists

Phase E is the pivot from *architecture* to *delivery* — the first phase directly concerned with implementation. Phases B–D produced three sets of gaps and candidate roadmap components; Phase E consolidates them, decides how change will actually be delivered, and produces the first complete **Architecture Roadmap**.

## Objectives

1. Generate the initial complete version of the **Architecture Roadmap**, based upon the gap analysis and candidate roadmap components from Phases B, C, and D.
2. Determine whether an **incremental approach** is required, and if so identify **Transition Architectures** that will deliver continuous business value.

"Continuous business value" is the load-bearing phrase: transition states aren't technical staging posts, they're states the business can *live in* and benefit from. Nobody thanks you for half a bridge, however structurally interesting.

## Key activities

- **Consolidate** the gap analysis results from B, C, and D into a single view — gaps that looked separate per domain often resolve into one piece of work (or conflict with each other).
- **Reconcile interoperability requirements** — where building blocks must work together, the requirements must agree.
- Confirm **readiness and risk** (the transformation readiness work from Phase A gets refreshed with what B–D learned).
- Formulate the high-level **Implementation and Migration Strategy** — the strategic approach (greenfield / revolutionary / evolutionary) and the delivery approach (quick win, achievable targets, value chain).
- **Identify and group work packages** — and for each, decide its nature: new build, purchased solution, or reuse of an existing asset (the make/buy/reuse decision, informed by the Enterprise Continuum).
- Identify **Transition Architectures** where the change can't land in one step.
- Create the Architecture Roadmap and the **Implementation and Migration Plan, version 0.1**.

## The three concepts to keep straight

| Concept | Definition |
|---|---|
| **Work package** | A set of actions to achieve one or more objectives — the unit that becomes a project/epic |
| **Transition Architecture** | A formally described intermediate state of the architecture at an architecturally significant point between baseline and target |
| **Architecture Roadmap** | The timeline view: work packages and transition architectures ordered to show progression from baseline to target |

Phase E is also where **Solution Building Blocks enter the story** — work packages begin binding required capability (ABBs) to implementable solutions (SBBs).
</script>

Consolidation insight: three phases independently raised "customer data fragmentation" gaps — they collapse into WP2 rather than three competing projects.

| **T1** | New digital products can launch against the facade without touching the monolith; integration risk collapses |

| **Target** | Full launch agility; monolith run-cost and risk eliminated |

Each transition state earns its keep — that's the "continuous business value" test. A transition state defined as "60% of code migrated" would fail it.
